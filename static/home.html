  @keyframes live-pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ── helpers ────────────────────────────────────────────────── */
function normalizePick(b) {
  return {
    sport: b.sport || "Football",
    league: b.league || "",
    match: b.match || `${b.home_team || ""} vs ${b.away_team || ""}`,
    market: b.market || "",
    selection: b.selection || "",
    odds: b.odds || 0,
    bookmaker: b.bookmaker || "—",
    ev: b.ev_pct ?? b.ev ?? 0,
    confidence: b.confidence || 0,
    model_probability: b.model_prob ? b.model_prob * 100 : 0,
    implied_probability: b.odds > 0 ? (1 / b.odds) * 100 : 0,
    kickoff_time: b.kickoff || b.kickoff_time || "",
    detected_at: b.created_at || b.detected_at || "",
    featured: b.featured || false,
    badge: b.badge || (b.ev_pct >= 10 ? "High EV" : b.confidence >= 85 ? "Top Confidence" : "Value"),
  };
}

function getEvClass(ev) {
  if (ev > 10) return "border-green-500 bg-green-500/5";
  if (ev >= 5) return "border-yellow-500 bg-yellow-500/5";
  return "border-zinc-700 bg-zinc-900";
}

function getEvPillClass(ev) {
  if (ev > 10) return "ev-pill-high";
  if (ev >= 5)  return "ev-pill-med";
  return "ev-pill-low";
}

function getRowClass(ev) {
  if (ev >= 15) return "row-ev-high";
  if (ev >= 5)  return "row-ev-med";
  return "row-ev-low";
}

function ConfBar({ v }) {
  return (
    <div className="flex items-center gap-2">
      <span className="text-xs text-zinc-300 w-8 shrink-0">{Math.round(v)}%</span>
      <div className="conf-track flex-1 h-1.5" style={{maxWidth: 48}}>
        <div className="conf-fill-bar" style={{width: `${Math.min(100, v)}%`}} />
      </div>
    </div>
  );
}

function EvPill({ ev }) {
  return (
    <span className={`${getEvPillClass(ev)} text-xs font-bold px-2 py-0.5 rounded-full`}>
      +{Number(ev).toFixed(1)}%
    </span>
  );
}

function fmtKickoff(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  const diff = d - Date.now();
  const time = d.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });
  const today = d.toDateString() === new Date().toDateString();
  if (!today) {
    return d.toLocaleDateString("sv-SE", { month: "short", day: "numeric" }) + " " + time;
  }
  if (diff > 0 && diff < 7200000) {
    const m = Math.floor(diff / 60000);
    return m < 60 ? `${m}m` : `${Math.floor(m / 60)}h ${m % 60}m`;
  }
  return time;
}

function fmtDetected(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });
}

/* ── HeaderStats ────────────────────────────────────────────── */
function HeaderStats({ stats }) {
  const items = [
    { label: "ROI",          value: stats ? `+${Number(stats.roi || 0).toFixed(1)}%` : "+22.7%", color: "text-green-400" },
    { label: "Units",        value: stats ? `+${Number(stats.units || 0).toFixed(0)}u` : "+829u",  color: "text-green-400" },
    { label: "Bets Tracked", value: stats ? Number(stats.bets || 0).toLocaleString() : "4,258",   color: "text-white" },
    { label: "Hit Rate",     value: stats ? `${Number(stats.hit_rate || 0).toFixed(1)}%` : "54.5%", color: "text-white" },
  ];
  return (
    <div className="flex flex-wrap gap-2">
      {items.map((item) => (
        <div key={item.label} className="flex items-center gap-2 rounded-xl border border-zinc-800 bg-zinc-900 px-4 py-2">
          <span className="text-xs text-zinc-500 uppercase tracking-widest whitespace-nowrap">{item.label}</span>
          <span className={`text-base font-bold ${item.color}`}>{item.value}</span>
        </div>
      ))}
    </div>
  );
}

/* ── PickCard ───────────────────────────────────────────────── */
function PickCard({ pick }) {
  const badgeColor = pick.ev > 10
    ? "bg-green-500/10 text-green-400 border border-green-500/20"
    : pick.ev >= 5
    ? "bg-yellow-500/10 text-yellow-400 border border-yellow-500/20"
    : "bg-zinc-800 text-zinc-300";
  return (
    <div className={`rounded-2xl border p-4 flex flex-col gap-3 ${getEvClass(pick.ev)}`}>
      <div className="flex items-center justify-between">
        <span className={`text-xs rounded-full px-2 py-0.5 font-medium ${badgeColor}`}>{pick.badge}</span>
        <span className="text-xs text-zinc-500 truncate ml-2 max-w-[120px]">{pick.league}</span>
      </div>
      <div>
        <div className="text-white font-semibold text-sm leading-snug">{pick.match}</div>
        <div className="mt-0.5 text-xs text-zinc-400">{pick.market}</div>
      </div>
      <div className="grid grid-cols-3 gap-2 text-sm border-t border-zinc-800 pt-3">
        <div>
          <div className="text-zinc-500 text-xs mb-0.5">Odds</div>
          <div className="text-white font-semibold">{Number(pick.odds).toFixed(2)}</div>
        </div>
        <div>
          <div className="text-zinc-500 text-xs mb-0.5">EV</div>
          <EvPill ev={pick.ev} />
        </div>
        <div>
          <div className="text-zinc-500 text-xs mb-0.5">Conf.</div>
          <ConfBar v={pick.confidence} />
        </div>
      </div>
      <div className="text-xs text-zinc-500 flex justify-between">
        <span>{pick.bookmaker}</span>
        <span>⏱ {fmtKickoff(pick.kickoff_time)}</span>
      </div>
    </div>
  );
}

/* ── PremiumTeaser ──────────────────────────────────────────── */
function PremiumTeaser() {

        Join Discord

}

/* ── DashboardPage ──────────────────────────────────────────── */
function DashboardPage() {
  const [allPicks, setAllPicks] = useState(mockPicks);
  const [apiStats, setApiStats] = useState(null);
  const [loading, setLoading] = useState(true);
  const [isMock, setIsMock] = useState(false);

  const [sport, setSport] = useState("All");
  const [marketSearch, setMarketSearch] = useState("");
  const [minOdds, setMinOdds] = useState("");
  const [maxOdds, setMaxOdds] = useState("");
  const [minEv, setMinEv] = useState("");
  const [onlyToday, setOnlyToday] = useState(false);
  const [onePerMatch, setOnePerMatch] = useState(false);
  const [sortBy, setSortBy] = useState("ev_desc");
  const [quickFilter, setQuickFilter] = useState("all");
  const [liveFilter, setLiveFilter] = useState("all");
  const [evSlider, setEvSlider] = useState(0);

  const fetchData = useCallback(async () => {
    setLoading(true);
    try {
      const [bRes, sRes] = await Promise.all([
        fetch("/bets?status=upcoming&limit=200&sort=ev"),
        fetch("/bets/stats"),
      ]);
      if (!bRes.ok) throw new Error("API error");
      const bData = await bRes.json();
      const items = (bData.bets || []).filter(
        (b) => !b.status || b.status === "pending"
      );
      if (items.length > 0) {
        setAllPicks(items.map(normalizePick));
        setIsMock(false);
      } else {
        setAllPicks(mockPicks);
        setIsMock(true);
      }
      if (sRes.ok) {
        const sd = await sRes.json();
        setApiStats({
          roi: sd.roi ?? 22.7,
          units: sd.profit_units ?? 829,
          bets: sd.total ?? 4258,
          hit_rate: sd.hit_rate ?? 54.5,
        });
      }
    } catch {
      setAllPicks(mockPicks);
      setIsMock(true);
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    fetchData();
    const t = setInterval(fetchData, 5 * 60000);
    return () => clearInterval(t);
  }, []);

  const allSports = useMemo(
    () => ["All", ...new Set(allPicks.map((p) => p.sport).filter(Boolean))],
    [allPicks]
  );

  const todayStr = new Date().toISOString().slice(0, 10);

  const filtered = useMemo(() => {
    let rows = [...allPicks];
    if (sport !== "All") rows = rows.filter((p) => p.sport === sport);
    if (marketSearch.trim()) {
      rows = rows.filter((p) =>
        `${p.match} ${p.market} ${p.league}`
          .toLowerCase()
          .includes(marketSearch.toLowerCase())
      );
    }
    if (minOdds) rows = rows.filter((p) => p.odds >= Number(minOdds));
    if (maxOdds) rows = rows.filter((p) => p.odds <= Number(maxOdds));
    if (minEv) rows = rows.filter((p) => p.ev >= Number(minEv));
    if (quickFilter === "high_ev") rows = rows.filter((p) => p.ev > 10);
    if (quickFilter === "top_conf") rows = rows.filter((p) => p.confidence >= 80);
    if (evSlider > 0) rows = rows.filter((p) => p.ev >= evSlider);
    if (liveFilter === "prematch") rows = rows.filter((p) => (p.status || "prematch") === "prematch");
    if (liveFilter === "live") rows = rows.filter((p) => p.status === "live");
    if (onlyToday) {
      rows = rows.filter(
        (p) => (p.kickoff_time || "").startsWith(todayStr)
      );
    }
    if (onePerMatch) {
      const seen = new Set();
      rows = rows.filter((p) => {
        if (seen.has(p.match)) return false;
        seen.add(p.match);
        return true;
      });
    }
    const sorters = {
      ev_desc:   (a, b) => b.ev - a.ev,
      ev_asc:    (a, b) => a.ev - b.ev,
      conf_desc: (a, b) => b.confidence - a.confidence,
      odds_desc: (a, b) => b.odds - a.odds,
      kickoff:   (a, b) => new Date(a.kickoff_time) - new Date(b.kickoff_time),
    };
    return rows.sort(sorters[sortBy] || sorters.ev_desc);
  }, [allPicks, sport, marketSearch, minOdds, maxOdds, minEv, onlyToday, onePerMatch, sortBy, quickFilter, todayStr]);

  const featured = useMemo(() => {
    const f = filtered.filter((p) => p.featured).slice(0, 4);
    if (f.length >= 4) return f;
    const extra = filtered.filter((p) => !p.featured).slice(0, 4 - f.length);
    return [...f, ...extra];
  }, [filtered]);

  return (
    <div className="min-h-screen bg-black text-white">
      <div className="mx-auto max-w-7xl px-4 py-8">

        {/* ── Header ── */}
        <header className="mb-8">
          <div className="flex items-center justify-between mb-5">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center text-white text-xs font-black shrink-0" style={{background:"linear-gradient(135deg,#22c55e,#16a34a)"}}>P</div>
              <div>
                <h1 className="text-lg font-bold leading-tight">PGR Sports Analytics</h1>
                <p className="text-xs text-zinc-500">We identify value — not just picks.</p>
              </div>
            </div>
            <div className="flex gap-2 items-center">
              <div className="flex items-center gap-1.5 text-xs text-zinc-500 mr-1">
                <span className="live-dot w-1.5 h-1.5 rounded-full bg-green-400 inline-block" />
                Live
              </div>
              {isMock && (
                <span className="text-xs text-yellow-400 border border-yellow-400/30 bg-yellow-400/10 px-2 py-1 rounded-full">
                  DEMO
                </span>
              )}
              <button
                onClick={fetchData}
                className="rounded-xl border border-zinc-700 px-3 py-1.5 hover:bg-zinc-900 text-xs"
              >
                ↻ Refresh
              </button>
              <button className="rounded-xl bg-green-500 px-3 py-1.5 font-medium text-black hover:bg-green-400 text-xs">
                Discord
              </button>
            </div>
          </div>
          <HeaderStats stats={apiStats} />
        </header>

        {/* ── Top Value Picks ── */}
        <section className="mb-10">
          <div className="mb-4 flex items-center justify-between">
            <h2 className="text-2xl font-semibold">Top Value Picks</h2>
            <span className="text-sm text-zinc-400">Featured model selections</span>
          </div>
          {loading ? (
            <div className="text-center py-12 text-zinc-400">Loading picks…</div>
          ) : (
            <div className="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">
              {featured.map((pick, i) => (
                <PickCard key={`${pick.match}-${pick.market}-${i}`} pick={pick} />
              ))}
            </div>
          )}
        </section>

        {/* ── Live Value Scanner ── */}
        <section className="mb-8 rounded-2xl border border-zinc-800 overflow-hidden" style={{background:"#0a0d14"}}>

          {/* Scanner header */}
          <div className="flex items-center justify-between px-4 py-3 border-b border-zinc-800" style={{background:"rgba(255,255,255,0.02)"}}>
            <div className="flex items-center gap-3">
              <span className="text-sm font-bold text-white">Live Value Scanner</span>
              <span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{background:"rgba(34,197,94,0.12)",color:"#4ade80",border:"1px solid rgba(34,197,94,0.2)"}}>
                {filtered.length} opportunities
              </span>
            </div>
            <div className="flex items-center gap-1.5 text-xs text-zinc-500">
              <span className="live-dot w-1.5 h-1.5 rounded-full bg-green-400 inline-block" />
              Auto-refresh 5 min
            </div>
          </div>

          {/* Filter bar */}
          <div className="flex flex-wrap gap-3 px-4 py-3 border-b border-zinc-800/60" style={{background:"rgba(255,255,255,0.01)"}}>

            {/* Sport */}
            <select value={sport} onChange={(e) => setSport(e.target.value)}
              className="text-xs rounded-lg px-3 py-1.5 text-zinc-200 outline-none"
              style={{background:"#111827",border:"1px solid rgba(255,255,255,0.1)"}}>
              {allSports.map((s) => <option key={s} className="bg-zinc-900">{s}</option>)}
            </select>

            {/* Live / Prematch toggle */}
            <div className="flex rounded-lg overflow-hidden text-xs" style={{border:"1px solid rgba(255,255,255,0.1)"}}>
              {[["all","All"],["prematch","Prematch"],["live","🔴 Live"]].map(([k,l]) => (
                <button key={k} onClick={() => setLiveFilter(k)}
                  className="px-3 py-1.5 transition-colors"
                  style={{background: liveFilter===k ? "#22c55e" : "#111827", color: liveFilter===k ? "#000" : "#94a3b8", fontWeight: liveFilter===k ? 700 : 400}}>
                  {l}
                </button>
              ))}
            </div>

            {/* EV slider */}
            <div className="flex items-center gap-2">
              <span className="text-xs text-zinc-500 whitespace-nowrap">EV ≥ <span className="text-green-400 font-bold">{evSlider > 0 ? `${evSlider}%` : "Any"}</span></span>
              <input type="range" min="0" max="30" step="1" value={evSlider} onChange={(e) => setEvSlider(Number(e.target.value))}
                className="w-24 accent-green-500" />
            </div>

            {/* Odds range */}
            <div className="flex items-center gap-1.5">
              <input type="number" placeholder="Min odds" step="0.05" value={minOdds} onChange={(e) => setMinOdds(e.target.value)}
                className="text-xs rounded-lg px-2 py-1.5 text-zinc-200 placeholder-zinc-600 outline-none w-20"
                style={{background:"#111827",border:"1px solid rgba(255,255,255,0.1)"}} />
              <span className="text-zinc-600 text-xs">–</span>
              <input type="number" placeholder="Max odds" step="0.05" value={maxOdds} onChange={(e) => setMaxOdds(e.target.value)}
                className="text-xs rounded-lg px-2 py-1.5 text-zinc-200 placeholder-zinc-600 outline-none w-20"
                style={{background:"#111827",border:"1px solid rgba(255,255,255,0.1)"}} />
            </div>

            {/* Sort */}
            <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}
              className="text-xs rounded-lg px-3 py-1.5 text-zinc-200 outline-none ml-auto"
              style={{background:"#111827",border:"1px solid rgba(255,255,255,0.1)"}}>
              <option value="ev_desc"   className="bg-zinc-900">EV — High to Low</option>
              <option value="ev_asc"    className="bg-zinc-900">EV — Low to High</option>
              <option value="conf_desc" className="bg-zinc-900">Confidence ↓</option>
              <option value="odds_desc" className="bg-zinc-900">Odds ↓</option>
              <option value="kickoff"   className="bg-zinc-900">Kickoff ↑</option>
            </select>
          </div>

          {/* Table */}
          {loading ? (
            <div className="py-16 text-center text-zinc-500 text-sm">Loading scanner…</div>
          ) : filtered.length === 0 ? (
            <div className="py-16 text-center text-zinc-600">No opportunities match your filters</div>
          ) : (
            <div className="overflow-x-auto" style={{maxHeight: 520, overflowY:"auto"}}>
              <table className="min-w-full text-sm">
                <thead>
                  <tr style={{background:"#0d1117",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                    {["Match","Market","Odds","EV %","Confidence","Kickoff"].map(h => (
                      <th key={h} className="sticky-th px-4 py-2.5 text-left text-xs font-semibold text-zinc-500 uppercase tracking-widest whitespace-nowrap"
                        style={{background:"#0d1117"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((pick, i) => {
                    const isHighEv = pick.ev >= 15;
                    return (
                      <tr key={`${pick.match}-${pick.market}-${i}`}
                        className={`transition-all ${getRowClass(pick.ev)}`}
                        style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>

                        {/* Match + league */}
                        <td className="px-4 py-3">
                          <div className="font-semibold text-xs text-white leading-tight truncate max-w-[180px]">{pick.match}</div>
                          <div className="text-xs text-zinc-500 mt-0.5 truncate max-w-[180px]">{pick.league} · {pick.bookmaker}</div>
                        </td>

                        {/* Market */}
                        <td className="px-4 py-3">
                          <span className="text-xs text-zinc-300 px-2 py-0.5 rounded whitespace-nowrap"
                            style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.07)"}}>
                            {pick.market}
                          </span>
                        </td>

                        {/* Odds */}
                        <td className="px-4 py-3">
                          <span className="text-sm font-bold" style={{color: isHighEv ? "#4ade80" : "#c4b5fd"}}>{Number(pick.odds).toFixed(2)}</span>
                        </td>

                        {/* EV */}
                        <td className="px-4 py-3">
                          <EvPill ev={pick.ev} />
                        </td>

                        {/* Confidence */}
                        <td className="px-4 py-3">
                          <ConfBar v={pick.confidence} />
                        </td>

                        {/* Kickoff */}
                        <td className="px-4 py-3 whitespace-nowrap">
                          <span className={`text-xs font-medium ${isHighEv ? "text-green-400" : "text-zinc-400"}`}>
                            {fmtKickoff(pick.kickoff_time)}
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* Footer legend */}
          <div className="flex items-center justify-between px-4 py-2.5 border-t border-zinc-800/60" style={{background:"rgba(255,255,255,0.01)"}}>
            <div className="flex items-center gap-4 text-xs text-zinc-600">
              <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-sm inline-block" style={{background:"rgba(34,197,94,0.4)"}} /> EV ≥ 15%</span>
              <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-sm inline-block" style={{background:"rgba(234,179,8,0.3)"}} /> EV 5–15%</span>
            </div>
            <span className="text-xs text-zinc-600">Sorted by {sortBy === "ev_desc" ? "EV ↓" : sortBy === "ev_asc" ? "EV ↑" : sortBy === "conf_desc" ? "Confidence ↓" : sortBy === "odds_desc" ? "Odds ↓" : "Kickoff ↑"}</span>
          </div>
        </section>

        {/* ── Premium Teaser ── */}
        <PremiumTeaser />

        <footer className="mt-10 text-center text-xs text-zinc-600">
          PGR Sports Analytics · Data analysis only · Not financial advice
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DashboardPage />);
</script>
</body>
</html>
