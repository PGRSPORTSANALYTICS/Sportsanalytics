<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGR Sports Analytics — Value Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0d14;
  --bg2:#0d1117;
  --surface:#111827;
  --card:#151e2d;
  --card2:#1a2235;
  --card3:#1f2a3c;
  --accent:#6366f1;
  --accent-glow:rgba(99,102,241,.18);
  --accent2:#818cf8;
  --green:#22c55e;
  --green-dim:rgba(34,197,94,.08);
  --green-glow:rgba(34,197,94,.2);
  --yellow:#f59e0b;
  --yellow-dim:rgba(245,158,11,.07);
  --red:#ef4444;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#64748b;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.1);
  --radius:10px;
  --radius-sm:6px;
  --radius-lg:14px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;font-size:14px;line-height:1.5}
a{text-decoration:none;color:inherit}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--card3);border-radius:3px}

/* ── Topnav ── */
.nav{position:sticky;top:0;z-index:200;background:rgba(10,13,20,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 1.5rem}
.nav-inner{max-width:1400px;margin:0 auto;height:56px;display:flex;align-items:center;gap:1.5rem}
.brand{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.brand-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#a855f7);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;color:#fff;flex-shrink:0}
.brand-name{font-weight:700;font-size:.95rem;letter-spacing:-.3px}
.brand-tag{font-size:.65rem;color:var(--text3);margin-top:-1px}
.nav-spacer{flex:1}
.nav-live{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--text3)}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nav-btns{display:flex;gap:.5rem}
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1rem;border-radius:var(--radius-sm);font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:.18s}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-discord{background:#5865F2;color:#fff}
.btn-discord:hover{background:#6875f5}

/* ── Hero ── */
.hero{padding:4rem 1.5rem 3rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(99,102,241,.12) 0%,transparent 70%);pointer-events:none}
.hero-label{display:inline-flex;align-items:center;gap:.4rem;background:var(--card2);border:1px solid var(--border2);padding:.25rem .75rem;border-radius:999px;font-size:.7rem;font-weight:600;color:var(--accent2);margin-bottom:1.25rem;letter-spacing:.4px;text-transform:uppercase}
.hero-title{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;letter-spacing:-.04em;line-height:1.1;margin-bottom:.75rem;background:linear-gradient(135deg,#fff 40%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(.9rem,2vw,1.05rem);color:var(--text2);max-width:520px;margin:0 auto 2rem;line-height:1.65}
.hero-ctas{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem}

/* ── Stat bar ── */
.stat-bar{display:inline-flex;flex-wrap:wrap;justify-content:center;gap:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin:0 auto}
.stat-item{padding:.75rem 1.5rem;text-align:center;position:relative}
.stat-item+.stat-item::before{content:'';position:absolute;left:0;top:20%;height:60%;width:1px;background:var(--border)}
.stat-val{font-size:1.25rem;font-weight:800;line-height:1}
.stat-val.green{color:var(--green)}
.stat-val.accent{color:var(--accent2)}
.stat-val.yellow{color:var(--yellow)}
.stat-lbl{font-size:.65rem;color:var(--text3);margin-top:.2rem;text-transform:uppercase;letter-spacing:.6px}

/* ── Section ── */
.section{max-width:1400px;margin:0 auto;padding:0 1.5rem 3rem}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem}
.section-title{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.section-title-badge{background:var(--accent);color:#fff;font-size:.62rem;font-weight:700;padding:.15rem .45rem;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}
.section-sub{font-size:.75rem;color:var(--text3)}
.section-link{font-size:.75rem;color:var(--accent2);cursor:pointer}
.section-link:hover{text-decoration:underline}

/* ── Pick Cards ── */
.picks-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
@media(max-width:1100px){.picks-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.picks-grid{grid-template-columns:1fr}}

.pick-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;position:relative;overflow:hidden;transition:.2s;cursor:default}
.pick-card:hover{border-color:rgba(255,255,255,.14);transform:translateY(-2px)}
.pick-card.ev-high{border-color:rgba(34,197,94,.2);box-shadow:0 0 24px var(--green-dim)}
.pick-card.ev-med{border-color:rgba(245,158,11,.18);box-shadow:0 0 24px rgba(245,158,11,.07)}
.pick-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.pick-card.ev-high::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.pick-card.ev-med::before{background:linear-gradient(90deg,transparent,var(--yellow),transparent)}
.pick-card.ev-accent::before{background:linear-gradient(90deg,transparent,var(--accent),transparent)}

.pick-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.pick-badge{font-size:.62rem;font-weight:700;padding:.18rem .5rem;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}
.badge-high-ev{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.badge-early{background:rgba(99,102,241,.15);color:var(--accent2);border:1px solid rgba(99,102,241,.25)}
.badge-conf{background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.badge-value{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
.pick-sport-icon{font-size:1rem;opacity:.7}

.pick-league{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem}
.pick-match{font-size:.92rem;font-weight:700;line-height:1.3;margin-bottom:.25rem;color:var(--text)}
.pick-market{font-size:.75rem;color:var(--text2);margin-bottom:.9rem}

.pick-stats{display:grid;grid-template-columns:1fr 1fr;gap:.5rem .75rem;margin-bottom:.9rem}
.pick-stat-label{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.1rem}
.pick-stat-val{font-size:1rem;font-weight:700}
.pick-stat-val.ev{color:var(--green)}
.pick-stat-val.ev.med{color:var(--yellow)}
.pick-stat-val.odds{color:var(--accent2)}

.pick-footer{display:flex;align-items:center;justify-content:space-between;padding-top:.75rem;border-top:1px solid var(--border);font-size:.7rem;color:var(--text3)}
.pick-kickoff{display:flex;align-items:center;gap:.3rem}
.kickoff-urgent{color:var(--yellow);font-weight:600}

/* ── Conf bar ── */
.conf-wrap{display:flex;align-items:center;gap:.4rem}
.conf-bar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;max-width:60px}
.conf-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2))}

/* ── Filter bar ── */
.filter-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.filter-row{display:flex;flex-wrap:wrap;gap:.6rem;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:.25rem;min-width:130px;flex:1}
.fg-sm{min-width:80px;max-width:110px;flex:0}
.fl{font-size:.62rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.fi{background:var(--card2);color:var(--text);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:.4rem .6rem;font-size:.8rem;width:100%;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--accent)}
.fi option{background:var(--card)}
.fi-search{min-width:160px;flex:2}
.filter-divider{width:1px;height:32px;background:var(--border);align-self:flex-end;flex-shrink:0;margin:0 .1rem}
.toggle-row{display:flex;flex-wrap:wrap;gap:.75rem;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);align-items:center}
.toggle{display:flex;align-items:center;gap:.4rem;cursor:pointer;user-select:none}
.ts{width:30px;height:17px;background:rgba(255,255,255,.1);border-radius:999px;position:relative;transition:.2s;flex-shrink:0}
.ts.on{background:var(--accent)}
.ts::after{content:'';width:11px;height:11px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:.2s}
.ts.on::after{left:16px}
.tl{font-size:.75rem;color:var(--text2)}
.filter-row-actions{display:flex;align-items:center;gap:.5rem;margin-top:.5rem}
.btn-reset{background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:var(--radius-sm);padding:.35rem .75rem;font-size:.72rem;cursor:pointer}
.btn-reset:hover{color:var(--text);border-color:var(--text3)}
.result-count{font-size:.72rem;color:var(--text3);margin-left:auto}

/* ── MultiSelect ── */
.ms{position:relative}
.ms-box{background:var(--card2);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:.38rem .6rem;font-size:.8rem;cursor:pointer;min-height:32px;display:flex;flex-wrap:wrap;gap:.2rem;align-items:center}
.ms-box:hover{border-color:rgba(255,255,255,.15)}
.ms-tag{background:var(--accent);color:#fff;border-radius:3px;padding:.08rem .35rem;font-size:.65rem;font-weight:700;display:flex;align-items:center;gap:.2rem;white-space:nowrap}
.ms-x{cursor:pointer;opacity:.7;font-size:.75rem}
.ms-x:hover{opacity:1}
.ms-ph{color:var(--text3);font-size:.8rem}
.ms-drop{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);z-index:300;max-height:180px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.ms-opt{padding:.4rem .65rem;cursor:pointer;font-size:.8rem;display:flex;align-items:center;gap:.45rem;color:var(--text2)}
.ms-opt:hover{background:var(--card2);color:var(--text)}
.ms-opt.sel{color:var(--accent2)}
.ms-opt input{accent-color:var(--accent);width:12px;height:12px;flex-shrink:0}

/* ── Table ── */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:800px}
thead{position:sticky;top:56px;z-index:10}
thead tr{background:var(--card2);border-bottom:1px solid var(--border2)}
th{padding:.55rem .85rem;text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text2)}
th .si{margin-left:.3rem;opacity:.4;font-size:.6rem}
th.sorted .si{opacity:1;color:var(--accent2)}
td{padding:.6rem .85rem;border-bottom:1px solid var(--border);font-size:.82rem;white-space:nowrap;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
tr.row-green td{background:rgba(34,197,94,.04)}
tr.row-green:hover td{background:rgba(34,197,94,.07)}
tr.row-yellow td{background:rgba(245,158,11,.04)}
tr.row-yellow:hover td{background:rgba(245,158,11,.07)}

/* table badges */
.tb{display:inline-flex;align-items:center;padding:.12rem .4rem;border-radius:3px;font-size:.65rem;font-weight:700;white-space:nowrap}
.tb-sport-football{background:#0f2044;color:#60a5fa}
.tb-sport-basketball{background:#2d1410;color:#fb923c}
.tb-sport-props{background:#0d2010;color:#86efac}

.ev-chip{font-weight:700;font-size:.82rem}
.ev-chip.high{color:var(--green)}
.ev-chip.med{color:var(--yellow)}
.ev-chip.low{color:var(--text3)}

.odds-chip{font-weight:700;color:var(--accent2)}
.mkt-chip{background:var(--card3);color:var(--text2);padding:.1rem .38rem;border-radius:3px;font-size:.7rem}

.ko-soon{color:var(--yellow);font-weight:600}
.ko-past{color:var(--text3)}

/* ── Pagination ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:.4rem;padding:.75rem;border-top:1px solid var(--border)}
.pg-btn{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.32rem .65rem;font-size:.75rem;cursor:pointer;color:var(--text2);transition:.15s}
.pg-btn:hover:not(:disabled){border-color:var(--accent2);color:var(--text)}
.pg-btn:disabled{opacity:.3;cursor:default}
.pg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Premium teaser ── */
.teaser{background:linear-gradient(135deg,var(--card) 0%,rgba(99,102,241,.08) 100%);border:1px solid rgba(99,102,241,.2);border-radius:var(--radius-lg);padding:2rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;position:relative;overflow:hidden;margin-bottom:3rem}
.teaser::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(99,102,241,.12),transparent 70%);pointer-events:none}
.teaser-left{}
.teaser-eyebrow{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--accent2);margin-bottom:.4rem}
.teaser-title{font-size:1.1rem;font-weight:800;margin-bottom:.4rem}
.teaser-sub{font-size:.82rem;color:var(--text2);max-width:460px;line-height:1.6}
.teaser-perks{display:flex;flex-direction:column;gap:.35rem;margin-top:.85rem}
.teaser-perk{font-size:.78rem;color:var(--text2);display:flex;align-items:center;gap:.4rem}
.perk-dot{width:5px;height:5px;background:var(--accent2);border-radius:50%;flex-shrink:0}
.teaser-right{display:flex;flex-direction:column;align-items:center;gap:.75rem;flex-shrink:0}
.teaser-btn{background:linear-gradient(135deg,var(--accent),#a855f7);color:#fff;border:none;border-radius:var(--radius);padding:.7rem 1.75rem;font-size:.88rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.18s}
.teaser-btn:hover{opacity:.9;transform:scale(1.02)}
.teaser-note{font-size:.68rem;color:var(--text3)}

/* ── Trust ── */
.trust{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;margin-bottom:3rem}
.trust-inner{display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:center}
.trust-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:1rem}
.trust-stat{text-align:center;padding:.75rem 1rem;background:var(--card2);border-radius:var(--radius);border:1px solid var(--border)}
.trust-val{font-size:1.3rem;font-weight:800;color:var(--green)}
.trust-lbl{font-size:.65rem;color:var(--text3);margin-top:.2rem;text-transform:uppercase;letter-spacing:.5px}
.trust-right{text-align:right;max-width:240px}
.trust-badge{display:inline-flex;align-items:center;gap:.4rem;background:var(--green-dim);border:1px solid rgba(34,197,94,.2);border-radius:999px;padding:.35rem .85rem;font-size:.72rem;color:var(--green);font-weight:600;margin-bottom:.5rem}
.trust-note{font-size:.72rem;color:var(--text3);line-height:1.55}
@media(max-width:700px){.trust-inner{grid-template-columns:1fr}.trust-right{text-align:left;max-width:100%}}

/* ── Footer ── */
.footer{border-top:1px solid var(--border);padding:1.25rem 1.5rem;text-align:center;font-size:.7rem;color:var(--text3)}

/* ── Loading / empty ── */
.loading-state,.empty-state{text-align:center;padding:3.5rem 2rem;color:var(--text3)}
.spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto .75rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-icon{font-size:2rem;margin-bottom:.5rem;opacity:.4}

@media(max-width:768px){
  .nav-inner{padding:0}
  .hero{padding:2.5rem 1rem 2rem}
  .section{padding:0 1rem 2rem}
  .stat-item{padding:.6rem 1rem}
  .filter-row{flex-direction:column}
  .fg,.fg-sm{min-width:100%;max-width:100%}
  .filter-divider{display:none}
  .teaser{padding:1.25rem}
  .trust-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ─── MOCK DATA ─────────────────────────────────────────────── */
const now = Date.now();
const h = ms => new Date(now + ms * 3600000).toISOString();
const MOCK_BETS = [

  { id:'b5', sport:'football', league:'UEFA Europa League', match:'AS Roma vs Bologna', market:'Corners Over 8.5', selection:'Over', odds:1.91, bookmaker:'bet365', ev_pct:25.0, confidence:69, model_prob:0.68, kickoff:h(7), created_at:new Date().toISOString(), featured:false, badge:'High EV', status:'pending' },

  { id:'b7', sport:'football', league:'La Liga', match:'Real Madrid vs Barcelona', market:'BTTS Yes', selection:'Yes', odds:1.68, bookmaker:'Pinnacle', ev_pct:6.2, confidence:81, model_prob:0.67, kickoff:h(18), created_at:new Date().toISOString(), featured:false, badge:'Value', status:'pending' },
  { id:'b8', sport:'football', league:'Bundesliga', match:'Bayern Munich vs Dortmund', market:'Home Win', selection:'Home', odds:1.54, bookmaker:'Unibet', ev_pct:11.5, confidence:88, model_prob:0.72, kickoff:h(3), created_at:new Date().toISOString(), featured:false, badge:'High EV', status:'pending' },

/* ─── HELPERS ─────────────────────────────────────────────── */
function evClass(ev) {
  if(ev == null) return 'low';
  return ev >= 10 ? 'high' : ev >= 5 ? 'med' : 'low';
}
function sportIcon(s) {
  return s === 'football' ? '⚽' : s === 'basketball' ? '🏀' : '🎯';
}
function fmtOdds(v) { return v ? v.toFixed(2) : '—'; }
function fmtEv(v) { return v != null ? (v >= 0 ? `+${v.toFixed(1)}%` : `${v.toFixed(1)}%`) : '—'; }
function fmtConf(v) { return v != null ? `${Math.round(v)}%` : '—'; }
function isToday(iso) { if(!iso) return false; return new Date(iso).toDateString() === new Date().toDateString(); }
function withinH(iso, h) { if(!iso) return false; const d = new Date(iso) - Date.now(); return d > 0 && d <= h * 3600000; }
function fmtKickoff(iso) {
  if(!iso) return { text:'—', urgent:false, past:false };
  const d = new Date(iso), diff = d - Date.now();
  const past = diff < 0;
  const urgent = !past && diff < 7200000;
  const time = d.toLocaleTimeString('sv-SE', {hour:'2-digit',minute:'2-digit'});
  const today = d.toDateString() === new Date().toDateString();
  const text = past ? 'Started' : today ? time : `${d.toLocaleDateString('sv-SE',{month:'short',day:'numeric'})} ${time}`;
  const countdown = !past && diff < 3600000 ? `${Math.floor(diff/60000)}m` : !past && diff < 7200000 ? `${Math.floor(diff/3600000)}h ${Math.floor((diff%3600000)/60000)}m` : null;
  return { text: countdown || text, urgent, past };
}
function fmtDetected(iso) { if(!iso) return '—'; return new Date(iso).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}); }

/* ─── MultiSelect ──────────────────────────────────────────── */
function MultiSelect({ opts, val, onChange, ph }){
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const h = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const toggle = o => onChange(val.includes(o) ? val.filter(v=>v!==o) : [...val, o]);
  return (
    <div className="ms" ref={ref}>
      <div className="ms-box" onClick={() => setOpen(!open)}>
        {val.length === 0 ? <span className="ms-ph">{ph}</span> :
          val.map(v => <span key={v} className="ms-tag">{v}<span className="ms-x" onClick={e=>{e.stopPropagation();toggle(v);}}>×</span></span>)}
      </div>
      {open && (
        <div className="ms-drop">
          {opts.map(o => (
            <label key={o} className={`ms-opt ${val.includes(o)?'sel':''}`}>
              <input type="checkbox" checked={val.includes(o)} onChange={()=>toggle(o)} />{o}
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── DEFAULT FILTERS ──────────────────────────────────────── */
const DEFAULT_FILTERS = {
  search:'', sports:[], markets:[], leagues:[], books:[],
  oddsMin:'', oddsMax:'', evMin:'', evMax:'', confMin:'',
  window:'all', onlyToday:false, onePick:false, highValue:false
};

/* ─── APP ───────────────────────────────────────────────────── */
function App(){
  const [bets, setBets]         = useState([]);
  const [stats, setStats]       = useState(MOCK_STATS);
  const [loading, setLoading]   = useState(true);
  const [isMock, setIsMock]     = useState(false);
  const [lastUpd, setLastUpd]   = useState(null);
  const [filters, setFilters]   = useState(DEFAULT_FILTERS);
  const [sort, setSort]         = useState({ col:'ev_pct', dir:'desc' });

  /* fetch */
  const fetchAll = useCallback(async () => {
    setLoading(true);
    try {
      const [bRes, sRes] = await Promise.all([
        fetch('/bets?status=upcoming&limit=200&sort=ev'),
        fetch('/bets/stats')
      ]);
      if(!bRes.ok) throw new Error('fail');
      const bData = await bRes.json();
      const items = (bData.bets || []).filter(b => !b.status || b.status === 'pending');
      if(items.length > 0){
        setBets(items); setIsMock(false);
      } else { setBets(MOCK_BETS); setIsMock(true); }
      if(sRes.ok){
        const sd = await sRes.json();
        if(sd.roi != null) setStats({ roi: sd.roi?.toFixed(1) ?? '—', units: sd.profit_units?.toFixed(1) ?? '—', bets: sd.total ?? 0, hit_rate: sd.hit_rate?.toFixed(1) ?? '—' });
      }
    } catch { setBets(MOCK_BETS); setIsMock(true); }
    setLastUpd(new Date()); setLoading(false);
  }, []);

  useEffect(() => { fetchAll(); const t = setInterval(fetchAll, 5*60000); return () => clearInterval(t); }, []);

  /* filtering */
  const filtered = useMemo(() => {
    let list = [...bets];
    const q = filters.search.trim().toLowerCase();
    if(q) list = list.filter(b => (b.match||'').toLowerCase().includes(q) || (b.league||'').toLowerCase().includes(q));
    if(filters.sports.length)  list = list.filter(b => filters.sports.includes(b.sport));
    if(filters.markets.length) list = list.filter(b => filters.markets.includes(b.market));
    if(filters.leagues.length) list = list.filter(b => filters.leagues.includes(b.league));
    if(filters.books.length)   list = list.filter(b => filters.books.includes(b.bookmaker));
    if(filters.oddsMin !== '') list = list.filter(b => (b.odds||0) >= parseFloat(filters.oddsMin));
    if(filters.oddsMax !== '') list = list.filter(b => (b.odds||0) <= parseFloat(filters.oddsMax));
    if(filters.evMin !== '')   list = list.filter(b => (b.ev_pct||0) >= parseFloat(filters.evMin));
    if(filters.evMax !== '')   list = list.filter(b => (b.ev_pct||0) <= parseFloat(filters.evMax));
    if(filters.confMin !== '') list = list.filter(b => (b.confidence||0) >= parseFloat(filters.confMin));
    if(filters.window === 'today') list = list.filter(b => isToday(b.kickoff));
    else if(filters.window === '6h') list = list.filter(b => withinH(b.kickoff,6));
    else if(filters.window === '12h') list = list.filter(b => withinH(b.kickoff,12));
    else if(filters.window === '24h') list = list.filter(b => withinH(b.kickoff,24));
    if(filters.onlyToday) list = list.filter(b => isToday(b.kickoff));
    if(filters.highValue) list = list.filter(b => (b.ev_pct||0) >= 5);
    if(filters.onePick){
      const seen = new Set();
      list = list.filter(b => { if(seen.has(b.match)) return false; seen.add(b.match); return true; });
    }
    list.sort((a, b_) => {
      let av = sort.col === 'kickoff' ? (a.kickoff_epoch||a.kickoff||0) : sort.col === 'created_at' ? (a.created_at||'') : (a[sort.col]??( sort.dir==='asc'?Infinity:-Infinity));
      let bv = sort.col === 'kickoff' ? (b_.kickoff_epoch||b_.kickoff||0) : sort.col === 'created_at' ? (b_.created_at||'') : (b_[sort.col]??(sort.dir==='asc'?Infinity:-Infinity));
      if(typeof av === 'string') return sort.dir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      return sort.dir==='asc' ? av - bv : bv - av;
    });
    return list;
  }, [bets, filters, sort]);

  const featured = useMemo(() => bets.filter(b => b.featured).slice(0,4).length >= 4
    ? bets.filter(b => b.featured).slice(0,4)
    : [...bets].sort((a,b_) => (b_.ev_pct||0)-(a.ev_pct||0)).slice(0,4), [bets]);

  const handleSort = col => setSort(s => s.col===col ? {col, dir:s.dir==='desc'?'asc':'desc'} : {col, dir:'desc'});
  const resetFilters = () => setFilters(DEFAULT_FILTERS);
  const extraLocked = Math.max(0, bets.length - filtered.length + 12);

  return (
    <>
      {/* ── Nav ── */}
      <nav className="nav">
        <div className="nav-inner">
          <div className="brand">
            <div className="brand-icon">P</div>
            <div><div className="brand-name">PGR Sports Analytics</div><div className="brand-tag">Value Intelligence Platform</div></div>
          </div>
          <div className="nav-spacer" />
          <div className="nav-live"><span className="live-dot" />Live feed</div>
          {lastUpd && <span style={{fontSize:'.68rem',color:'var(--text3)'}}>Updated {fmtDetected(lastUpd.toISOString())}</span>}
          {isMock && <span style={{fontSize:'.65rem',color:'var(--yellow)',background:'rgba(245,158,11,.12)',padding:'.15rem .45rem',borderRadius:3,border:'1px solid rgba(245,158,11,.2)'}}>DEMO</span>}
          <div className="nav-btns">
            <a href="https://discord.gg/" target="_blank" className="btn btn-discord">Discord</a>
            <button className="btn btn-primary" onClick={fetchAll}>↻ Refresh</button>
          </div>
        </div>
      </nav>

      {/* ── Hero ── */}
      <section className="hero">
        <div className="hero-label">⚡ AI-Powered Value Detection</div>
        <h1 className="hero-title">We identify value —<br/>not just picks.</h1>
        <p className="hero-sub">PGR Sports Analytics scans thousands of markets to surface statistically significant edges. Data-driven. Transparent. No hype.</p>
        <div className="hero-ctas">
          <a href="https://discord.gg/" target="_blank" className="btn btn-discord" style={{padding:'.6rem 1.4rem',fontSize:'.85rem'}}>🎮 Join Discord</a>
          <button className="btn btn-ghost" style={{padding:'.6rem 1.4rem',fontSize:'.85rem'}} onClick={()=>document.getElementById('opportunities')?.scrollIntoView({behavior:'smooth'})}>View All Opportunities</button>
        </div>
        <HeaderStats stats={stats} />
      </section>

      {/* ── Top Picks ── */}
      <div className="section">
        <div className="section-header">
          <div className="section-title">
            🔥 Top Value Picks
            <span className="section-title-badge">Live</span>
          </div>
          <span className="section-sub">Highest EV opportunities right now</span>
        </div>
        {loading ? (
          <div className="loading-state"><div className="spinner" />Loading picks…</div>
        ) : (
          <div className="picks-grid">
            {featured.map(b => <PickCard key={b.id} bet={b} />)}
          </div>
        )}
      </div>

      {/* ── Filter + Table ── */}
      <div className="section" id="opportunities">
        <div className="section-header">
          <div className="section-title">📊 All Value Opportunities</div>
          <span className="section-sub">{bets.length} total · {filtered.length} matching filters</span>
        </div>
        <FilterBar bets={bets} filters={filters} setFilters={setFilters} sort={sort} setSort={setSort} onReset={resetFilters} resultCount={filtered.length} />
        {loading ? (
          <div className="loading-state"><div className="spinner" />Loading opportunities…</div>
        ) : (
          <ValueTable rows={filtered} sort={sort} onSort={handleSort} />
        )}
      </div>

      {/* ── Premium Teaser ── */}
      <div className="section">
        <PremiumTeaser extra={extraLocked} />
      </div>

      {/* ── Trust ── */}
      <div className="section">
        <div className="section-header">
          <div className="section-title">📈 Verified Results</div>
        </div>
        <TrustSection stats={stats} />
      </div>

      <footer className="footer">
        PGR Sports Analytics · Data analysis only · Not financial advice · {new Date().getFullYear()}
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
