/* ── helpers ────────────────────────────────────────────────── */
function normalizePick(b) {
  return {
    sport: b.sport || "Football",
    league: b.league || "",
    match: b.match || `${b.home_team || ""} vs ${b.away_team || ""}`,
    market: b.market || "",
    selection: b.selection || "",
    odds: b.odds || 0,
    bookmaker: b.bookmaker || "—",
    ev: b.ev_pct ?? b.ev ?? 0,
    confidence: b.confidence || 0,
    model_probability: b.model_prob ? b.model_prob * 100 : 0,
    implied_probability: b.odds > 0 ? (1 / b.odds) * 100 : 0,
    kickoff_time: b.kickoff || b.kickoff_time || "",
    detected_at: b.created_at || b.detected_at || "",
    featured: b.featured || false,
    badge: b.badge || (b.ev_pct >= 10 ? "High EV" : b.confidence >= 85 ? "Top Confidence" : "Value"),
  };
}

function getEvClass(ev) {
  if (ev > 10) return "border-green-500 bg-green-500/5";
  if (ev >= 5) return "border-yellow-500 bg-yellow-500/5";
  return "border-zinc-700 bg-zinc-900";
}

function getEvPillClass(ev) {
  if (ev > 10) return "ev-pill-high";
  if (ev >= 5)  return "ev-pill-med";
  return "ev-pill-low";
}

function getRowClass(ev) {
  if (ev > 10) return "row-ev-high";
  if (ev >= 5)  return "row-ev-med";
  return "row-ev-low";
}

function ConfBar({ v }) {
  return (
    <div className="flex items-center gap-2">
      <span className="text-xs text-zinc-300 w-8 shrink-0">{Math.round(v)}%</span>
      <div className="conf-track flex-1 h-1.5" style={{maxWidth: 48}}>
        <div className="conf-fill-bar" style={{width: `${Math.min(100, v)}%`}} />
      </div>
    </div>
  );
}

function EvPill({ ev }) {
  return (
    <span className={`${getEvPillClass(ev)} text-xs font-bold px-2 py-0.5 rounded-full`}>
      +{Number(ev).toFixed(1)}%
    </span>
  );
}

function fmtKickoff(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  const diff = d - Date.now();
  const time = d.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });
  const today = d.toDateString() === new Date().toDateString();
  if (!today) {
    return d.toLocaleDateString("sv-SE", { month: "short", day: "numeric" }) + " " + time;
  }
  if (diff > 0 && diff < 7200000) {
    const m = Math.floor(diff / 60000);
    return m < 60 ? `${m}m` : `${Math.floor(m / 60)}h ${m % 60}m`;
  }
  return time;
}

function fmtDetected(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleTimeString("sv-SE", { hour: "2-digit", minute: "2-digit" });
}

/* ── HeaderStats ────────────────────────────────────────────── */
function HeaderStats({ stats }) {
  const items = [
    { label: "ROI", value: stats ? `+${Number(stats.roi || 0).toFixed(1)}%` : "+22.7%" },
    { label: "Units", value: stats ? `+${Number(stats.units || 0).toFixed(0)}u` : "+829u" },
    { label: "Bets Tracked", value: stats ? Number(stats.bets || 0).toLocaleString() : "4,258" },
    { label: "Hit Rate", value: stats ? `${Number(stats.hit_rate || 0).toFixed(1)}%` : "54.5%" },
  ];
  return (
    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
      {items.map((item) => (
        <div key={item.label} className="rounded-2xl border border-zinc-800 bg-zinc-900 p-4">
          <div className="text-sm text-zinc-400">{item.label}</div>
          <div className="mt-1 text-2xl font-semibold text-white">{item.value}</div>
        </div>
      ))}
    </div>
  );
}

/* ── PickCard ───────────────────────────────────────────────── */
function PickCard({ pick }) {
  const badgeColor = pick.ev > 10
    ? "bg-green-500/10 text-green-400 border border-green-500/20"
    : pick.ev >= 5
    ? "bg-yellow-500/10 text-yellow-400 border border-yellow-500/20"
    : "bg-zinc-800 text-zinc-300";
  return (
    <div className={`rounded-2xl border p-4 flex flex-col gap-3 ${getEvClass(pick.ev)}`}>
      <div className="flex items-center justify-between">
        <span className={`text-xs rounded-full px-2 py-0.5 font-medium ${badgeColor}`}>{pick.badge}</span>
        <span className="text-xs text-zinc-500 truncate ml-2 max-w-[120px]">{pick.league}</span>
      </div>
      <div>
        <div className="text-white font-semibold text-sm leading-snug">{pick.match}</div>
        <div className="mt-0.5 text-xs text-zinc-400">{pick.market}</div>
      </div>
      <div className="grid grid-cols-3 gap-2 text-sm border-t border-zinc-800 pt-3">
        <div>
          <div className="text-zinc-500 text-xs mb-0.5">Odds</div>
          <div className="text-white font-semibold">{Number(pick.odds).toFixed(2)}</div>
        </div>
        <div>
          <div className="text-zinc-500 text-xs mb-0.5">EV</div>
          <EvPill ev={pick.ev} />
        </div>
        <div>
          <div className="text-zinc-500 text-xs mb-0.5">Conf.</div>
          <ConfBar v={pick.confidence} />
        </div>
      </div>
      <div className="text-xs text-zinc-500 flex justify-between">
        <span>{pick.bookmaker}</span>
        <span>⏱ {fmtKickoff(pick.kickoff_time)}</span>
      </div>
    </div>
  );
}

/* ── PremiumTeaser ──────────────────────────────────────────── */
function PremiumTeaser() {

    <div className="rounded-2xl border border-zinc-800 bg-zinc-900 p-6">

        More live value spots, earlier lines, and full dashboard access are available inside Discord.
      </p>
      <button className="mt-4 rounded-xl bg-green-500 px-4 py-2 font-medium text-black hover:bg-green-400">
        Join Discord
      </button>

}

/* ── DashboardPage ──────────────────────────────────────────── */
function DashboardPage() {
  const [allPicks, setAllPicks] = useState(mockPicks);
  const [apiStats, setApiStats] = useState(null);
  const [loading, setLoading] = useState(true);
  const [isMock, setIsMock] = useState(false);

  const [sport, setSport] = useState("All");
  const [marketSearch, setMarketSearch] = useState("");
  const [minOdds, setMinOdds] = useState("");
  const [maxOdds, setMaxOdds] = useState("");
  const [minEv, setMinEv] = useState("");
  const [onlyToday, setOnlyToday] = useState(false);
  const [onePerMatch, setOnePerMatch] = useState(false);
  const [sortBy, setSortBy] = useState("ev_desc");
  const [quickFilter, setQuickFilter] = useState("all");

  const fetchData = useCallback(async () => {
    setLoading(true);
    try {
      const [bRes, sRes] = await Promise.all([
        fetch("/bets?status=upcoming&limit=200&sort=ev"),
        fetch("/bets/stats"),
      ]);
      if (!bRes.ok) throw new Error("API error");
      const bData = await bRes.json();
      const items = (bData.bets || []).filter(
        (b) => !b.status || b.status === "pending"
      );
      if (items.length > 0) {
        setAllPicks(items.map(normalizePick));
        setIsMock(false);
      } else {
        setAllPicks(mockPicks);
        setIsMock(true);
      }
      if (sRes.ok) {
        const sd = await sRes.json();
        setApiStats({
          roi: sd.roi ?? 22.7,
          units: sd.profit_units ?? 829,
          bets: sd.total ?? 4258,
          hit_rate: sd.hit_rate ?? 54.5,
        });
      }
    } catch {
      setAllPicks(mockPicks);
      setIsMock(true);
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    fetchData();
    const t = setInterval(fetchData, 5 * 60000);
    return () => clearInterval(t);
  }, []);

  const allSports = useMemo(
    () => ["All", ...new Set(allPicks.map((p) => p.sport).filter(Boolean))],
    [allPicks]
  );

  const todayStr = new Date().toISOString().slice(0, 10);

  const filtered = useMemo(() => {
    let rows = [...allPicks];
    if (sport !== "All") rows = rows.filter((p) => p.sport === sport);
    if (marketSearch.trim()) {
      rows = rows.filter((p) =>
        `${p.match} ${p.market} ${p.league}`
          .toLowerCase()
          .includes(marketSearch.toLowerCase())
      );
    }
    if (minOdds) rows = rows.filter((p) => p.odds >= Number(minOdds));
    if (maxOdds) rows = rows.filter((p) => p.odds <= Number(maxOdds));
    if (minEv) rows = rows.filter((p) => p.ev >= Number(minEv));
    if (quickFilter === "high_ev") rows = rows.filter((p) => p.ev > 10);
    if (quickFilter === "top_conf") rows = rows.filter((p) => p.confidence >= 80);
    if (onlyToday) {
      rows = rows.filter(
        (p) => (p.kickoff_time || "").startsWith(todayStr)
      );
    }
    if (onePerMatch) {
      const seen = new Set();
      rows = rows.filter((p) => {
        if (seen.has(p.match)) return false;
        seen.add(p.match);
        return true;
      });
    }
    const sorters = {
      ev_desc:   (a, b) => b.ev - a.ev,
      ev_asc:    (a, b) => a.ev - b.ev,
      conf_desc: (a, b) => b.confidence - a.confidence,
      odds_desc: (a, b) => b.odds - a.odds,
      kickoff:   (a, b) => new Date(a.kickoff_time) - new Date(b.kickoff_time),
    };
    return rows.sort(sorters[sortBy] || sorters.ev_desc);
  }, [allPicks, sport, marketSearch, minOdds, maxOdds, minEv, onlyToday, onePerMatch, sortBy, quickFilter, todayStr]);

  const featured = useMemo(() => {
    const f = filtered.filter((p) => p.featured).slice(0, 4);
    if (f.length >= 4) return f;
    const extra = filtered.filter((p) => !p.featured).slice(0, 4 - f.length);
    return [...f, ...extra];
  }, [filtered]);

  return (
    <div className="min-h-screen bg-black text-white">
      <div className="mx-auto max-w-7xl px-4 py-8">

        {/* ── Header ── */}
        <header className="mb-8">
          <div className="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
            <div>
              <h1 className="text-3xl md:text-4xl font-bold">PGR Sports Analytics</h1>
              <p className="mt-2 text-zinc-400">We identify value — not just picks.</p>
            </div>
            <div className="flex gap-3 items-center">
              {isMock && (
                <span className="text-xs text-yellow-400 border border-yellow-400/30 bg-yellow-400/10 px-2 py-1 rounded-full">
                  DEMO
                </span>
              )}
              <button
                onClick={fetchData}
                className="rounded-xl border border-zinc-700 px-4 py-2 hover:bg-zinc-900 text-sm"
              >
                ↻ Refresh
              </button>
              <button className="rounded-xl bg-green-500 px-4 py-2 font-medium text-black hover:bg-green-400 text-sm">
                Join Discord
              </button>
            </div>
          </div>
          <div className="mt-6">
            <HeaderStats stats={apiStats} />
          </div>
        </header>

        {/* ── Top Value Picks ── */}
        <section className="mb-10">
          <div className="mb-4 flex items-center justify-between">
            <h2 className="text-2xl font-semibold">Top Value Picks</h2>
            <span className="text-sm text-zinc-400">Featured model selections</span>
          </div>
          {loading ? (
            <div className="text-center py-12 text-zinc-400">Loading picks…</div>
          ) : (
            <div className="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">
              {featured.map((pick, i) => (
                <PickCard key={`${pick.match}-${pick.market}-${i}`} pick={pick} />
              ))}
            </div>
          )}
        </section>

        {/* ── Filters ── */}
        <section className="mb-6 rounded-2xl border border-zinc-800 bg-zinc-950 p-4">
          <div className="mb-3 flex items-center justify-between">
            <div className="text-xl font-semibold">Filters</div>
            <div className="flex gap-2">
              {[
                { key: "all",      label: "All" },
                { key: "high_ev",  label: "⚡ High EV (>10%)" },
                { key: "top_conf", label: "🎯 Top Confidence" },
              ].map(({ key, label }) => (
                <button
                  key={key}
                  onClick={() => setQuickFilter(key)}
                  className={`text-xs px-3 py-1.5 rounded-lg transition-colors ${
                    quickFilter === key
                      ? "bg-green-500/20 text-green-400 border border-green-500/30"
                      : "border border-zinc-700 text-zinc-400 hover:text-zinc-200"
                  }`}
                >
                  {label}
                </button>
              ))}
            </div>
          </div>
          <div className="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-7">
            <select
              value={sport}
              onChange={(e) => setSport(e.target.value)}
              className="rounded-xl border border-zinc-800 bg-zinc-900 px-3 py-2 text-sm text-white outline-none"
            >
              {allSports.map((s) => (
                <option key={s} value={s} className="bg-zinc-900">{s}</option>
              ))}
            </select>

            <input
              value={marketSearch}
              onChange={(e) => setMarketSearch(e.target.value)}
              placeholder="Search team / market"
              className="rounded-xl border border-zinc-800 bg-zinc-900 px-3 py-2 text-sm text-white placeholder-zinc-600 outline-none xl:col-span-2"
            />

            <input
              value={minOdds}
              onChange={(e) => setMinOdds(e.target.value)}
              placeholder="Min odds"
              type="number"
              step="0.05"
              className="rounded-xl border border-zinc-800 bg-zinc-900 px-3 py-2 text-sm text-white placeholder-zinc-600 outline-none"
            />

            <input
              value={maxOdds}
              onChange={(e) => setMaxOdds(e.target.value)}
              placeholder="Max odds"
              type="number"
              step="0.05"
              className="rounded-xl border border-zinc-800 bg-zinc-900 px-3 py-2 text-sm text-white placeholder-zinc-600 outline-none"
            />

            <input
              value={minEv}
              onChange={(e) => setMinEv(e.target.value)}
              placeholder="Min EV %"
              type="number"
              step="1"
              className="rounded-xl border border-zinc-800 bg-zinc-900 px-3 py-2 text-sm text-white placeholder-zinc-600 outline-none"
            />

            <select
              value={sortBy}
              onChange={(e) => setSortBy(e.target.value)}
              className="rounded-xl border border-zinc-800 bg-zinc-900 px-3 py-2 text-sm text-white outline-none"
            >
              <option value="ev_desc"   className="bg-zinc-900">EV — High to Low</option>
              <option value="ev_asc"    className="bg-zinc-900">EV — Low to High</option>
              <option value="conf_desc" className="bg-zinc-900">Confidence ↓</option>
              <option value="odds_desc" className="bg-zinc-900">Odds ↓</option>
              <option value="kickoff"   className="bg-zinc-900">Kickoff ↑</option>
            </select>
          </div>
          <div className="mt-3 flex gap-4">
            <label className="flex items-center gap-2 text-sm text-zinc-300 cursor-pointer">
              <input
                type="checkbox"
                checked={onlyToday}
                onChange={() => setOnlyToday(!onlyToday)}
                className="accent-green-500"
              />
              Only today
            </label>
            <label className="flex items-center gap-2 text-sm text-zinc-300 cursor-pointer">
              <input
                type="checkbox"
                checked={onePerMatch}
                onChange={() => setOnePerMatch(!onePerMatch)}
                className="accent-green-500"
              />
              One per match
            </label>
          </div>
        </section>

        {/* ── Table + Teaser ── */}
        <section className="grid grid-cols-1 gap-6 xl:grid-cols-[1fr_320px]">
          <div className="rounded-2xl border border-zinc-800 bg-zinc-950 p-4">
            <div className="mb-4 flex items-center justify-between">
              <h2 className="text-2xl font-semibold">All Value Opportunities</h2>
              <span className="text-sm text-zinc-400">{filtered.length} results</span>
            </div>

            {loading ? (
              <div className="py-16 text-center text-zinc-400">Loading opportunities…</div>
            ) : filtered.length === 0 ? (
              <div className="py-16 text-center text-zinc-400">No results match your filters.</div>
            ) : (
              <div className="overflow-x-auto max-h-[560px] overflow-y-auto">
                <table className="min-w-full text-sm">
                  <thead className="text-zinc-400">
                    <tr className="border-b border-zinc-800">
                      <th className="sticky-th px-3 py-3 text-left font-medium text-xs uppercase tracking-wider">Match</th>
                      <th className="sticky-th px-3 py-3 text-left font-medium text-xs uppercase tracking-wider">League</th>
                      <th className="sticky-th px-3 py-3 text-left font-medium text-xs uppercase tracking-wider">Market</th>
                      <th className="sticky-th px-3 py-3 text-left font-medium text-xs uppercase tracking-wider">Odds</th>
                      <th className="sticky-th px-3 py-3 text-left font-medium text-xs uppercase tracking-wider">Book</th>
                      <th className="sticky-th px-3 py-3 text-left font-medium text-xs uppercase tracking-wider">EV %</th>
                      <th className="sticky-th px-3 py-3 text-left font-medium text-xs uppercase tracking-wider">Conf.</th>
                      <th className="sticky-th px-3 py-3 text-left font-medium text-xs uppercase tracking-wider">Kickoff</th>
                      <th className="sticky-th px-3 py-3 text-left font-medium text-xs uppercase tracking-wider">Found</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map((pick, i) => (
                      <tr
                        key={`${pick.match}-${pick.market}-${i}`}
                        className={`border-b border-zinc-900/60 hover:brightness-125 transition-all ${getRowClass(pick.ev)}`}
                      >
                        <td className="px-3 py-3 font-medium max-w-[200px] truncate">{pick.match}</td>
                        <td className="px-3 py-3 text-zinc-400 whitespace-nowrap text-xs">{pick.league}</td>
                        <td className="px-3 py-3 whitespace-nowrap text-zinc-300">{pick.market}</td>
                        <td className="px-3 py-3 font-semibold text-white">{Number(pick.odds).toFixed(2)}</td>
                        <td className="px-3 py-3 text-zinc-400 whitespace-nowrap text-xs">{pick.bookmaker}</td>
                        <td className="px-3 py-3">
                          <EvPill ev={pick.ev} />
                        </td>
                        <td className="px-3 py-3">
                          <ConfBar v={pick.confidence} />
                        </td>
                        <td className="px-3 py-3 text-zinc-400 whitespace-nowrap text-xs">
                          {fmtKickoff(pick.kickoff_time)}
                        </td>
                        <td className="px-3 py-3 text-zinc-500 whitespace-nowrap text-xs">
                          {fmtDetected(pick.detected_at)}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="mt-3 flex items-center gap-4 px-1 text-xs text-zinc-600">
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm inline-block" style={{background:"rgba(34,197,94,0.3)"}} /> EV &gt;10%</span>
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm inline-block" style={{background:"rgba(234,179,8,0.25)"}} /> EV 5–10%</span>
              </div>
            )}
          </div>

          <PremiumTeaser />
        </section>

        <footer className="mt-10 text-center text-xs text-zinc-600">
          PGR Sports Analytics · Data analysis only · Not financial advice
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DashboardPage />);
</script>
</body>
</html>
