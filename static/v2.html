<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#06060d"/>
<title>PGR · Live Scanner</title>
<script>
/* Set onerror FIRST so it catches any syntax error in the main script block */
window.onerror=function(msg,src,line,col,err){
  var el=document.getElementById('updatedAt');
  if(el)el.textContent='ERR:L'+line+' '+(String(msg||'').slice(0,22));
  return false;
};
/* Passive SW cleanup */
try{
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(x){x.unregister();});});
  }
  if('caches' in window){
    caches.keys().then(function(k){k.forEach(function(c){caches.delete(c);});});
  }
}catch(e){}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
@media(max-width:860px){html,body{overflow:auto}}

body{
  background:#06060d;
  color:#c8d4e8;
  font-family:-apple-system,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  font-size:12px;line-height:1.3;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'SF Mono','Fira Code',ui-monospace,monospace}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}

:root{
  --bg:#06060d;
  --bg1:#09090f;
  --bg2:#0d0d18;
  --line:#111122;
  --line2:#1a1a2e;
  --txt:#c8d4e8;
  --muted:#4a5870;
  --dim:#22283a;
  --green:#22c55e;
  --green-d:#061008;
  --green-b:#0f3020;
  --amber:#f5c842;
  --red:#ef4444;
  --blue:#60a5fa;
  --nav-h:40px;
  --strip-h:30px;
}

/* ── Nav ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);
  background:rgba(6,6,13,.98);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;padding:0 12px;
}
.brand{display:flex;align-items:center;gap:6px;font-weight:700;font-size:12px;letter-spacing:.3px}
.brand-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px #22c55e99;animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{opacity:1}60%{opacity:.2}}
.brand-v{color:var(--muted);font-weight:400;font-size:10px}
.live-pill{
  display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;
  background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);
  font-size:10px;font-weight:800;color:#86efac;font-family:'SF Mono',monospace;
}
.nav-sp{flex:1}
.nav-ts{font-size:10px;color:var(--muted);font-family:'SF Mono',monospace}
.tier-badge{padding:2px 7px;border-radius:3px;font-size:9px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;background:var(--bg2);color:var(--muted);border:1px solid var(--line2)}
.tier-badge.premium{background:rgba(245,200,66,.08);color:var(--amber);border-color:rgba(245,200,66,.25)}

/* ── KPI strip ── */
.kpi-strip{
  position:fixed;top:var(--nav-h);left:0;right:0;z-index:90;height:var(--strip-h);
  background:var(--bg1);border-bottom:1px solid var(--line);
  display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;
}
.kpi-strip::-webkit-scrollbar{display:none}
.ki{
  display:flex;align-items:center;gap:6px;padding:0 12px;height:100%;
  border-right:1px solid var(--line);white-space:nowrap;flex-shrink:0;
}
.ki-l{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.ki-v{font-size:11px;font-weight:800;color:var(--txt);font-family:'SF Mono',monospace}
.ki-v.g{color:var(--green)}
.ki-v.r{color:var(--red)}
.ki-v.a{color:var(--amber)}
.ki-v.b{color:var(--blue)}
.ki-v.dim{color:var(--muted);font-size:9px;font-weight:500;letter-spacing:.3px}

/* ── 3-col terminal ── */
.terminal{
  position:fixed;top:calc(var(--nav-h)+var(--strip-h));bottom:0;left:0;right:0;
  display:grid;grid-template-columns:188px 1fr 0;
  transition:grid-template-columns .16s ease;
}
.terminal.detail-open{grid-template-columns:188px 1fr 320px}
@media(max-width:860px){
  .terminal{position:static;display:block;padding-top:calc(var(--nav-h)+var(--strip-h))}
  .terminal.detail-open{grid-template-columns:unset}
}

/* ── Sidebar ── */
.sidebar{
  border-right:1px solid var(--line);background:var(--bg1);
  overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column;
}
.sidebar::-webkit-scrollbar{display:none}
.fs{padding:8px 8px 6px;border-bottom:1px solid var(--line)}
.fs-h{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px;font-weight:700}
.fc{display:flex;flex-wrap:wrap;gap:3px}
.chip{
  padding:3px 8px;border-radius:3px;background:transparent;border:1px solid var(--line2);
  color:var(--muted);font-size:10px;font-weight:600;
  transition:all .1s;cursor:pointer;user-select:none;
}
.chip:hover{border-color:var(--line2);color:var(--txt)}
.chip.active{background:rgba(34,197,94,.1);color:var(--green);border-color:rgba(34,197,94,.3)}
.chip.a-warn.active{background:rgba(245,200,66,.08);color:var(--amber);border-color:rgba(245,200,66,.3)}

.clv-blk{padding:8px;font-size:10px}
.clv-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--line)}
.clv-row:last-child{border-bottom:0}
.clv-l{color:var(--muted)}
.clv-v{font-weight:700;font-family:'SF Mono',monospace}
.hist{display:flex;align-items:flex-end;gap:2px;height:36px;margin-top:6px}
.hb{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1}
.hb-f{width:100%;border-radius:1px 1px 0 0;min-height:2px;background:var(--green);opacity:.5}
.hb-f.n{background:var(--red)}
.hb-l{font-size:7px;color:var(--dim);text-align:center}

@media(max-width:860px){
  .sidebar{
    background:transparent;border-right:none;border-bottom:1px solid var(--line);
    overflow-x:auto;display:block;white-space:nowrap;padding:5px 8px;
  }
  .fs{display:inline-flex;align-items:center;gap:4px;border-bottom:none;padding:0 6px 0 0;vertical-align:middle}
  .fs-h{display:none}
  .fc{flex-wrap:nowrap}
  .clv-blk{display:none}
}

/* ── Scanner ── */
.scanner{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

.sc-head{
  padding:5px 10px;border-bottom:1px solid var(--line2);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  background:var(--bg1);
}
.sc-h-title{font-size:9px;text-transform:uppercase;letter-spacing:.7px;font-weight:700;color:var(--muted)}
.sc-h-count{font-size:10px;font-weight:800;color:var(--green);font-family:'SF Mono',monospace}
.sc-h-sp{flex:1}
.sc-h-meta{font-size:9px;color:var(--dim);font-family:'SF Mono',monospace}

/* ── Table header ── */
.tbl-hdr{
  display:grid;
  grid-template-columns:56px 92px 1fr 148px 72px;
  padding:4px 10px;gap:6px;
  border-bottom:1px solid var(--line2);
  background:var(--bg1);
  position:sticky;top:0;z-index:2;
  flex-shrink:0;
}
.th{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);font-weight:700}
@media(max-width:860px){
  .tbl-hdr{grid-template-columns:54px 1fr 100px;padding:4px 8px}
  .th-match,.th-move{display:none}
}

/* ── Scanner body ── */
.sc-body{flex:1;overflow-y:auto;scrollbar-width:thin}
.sc-body::-webkit-scrollbar{width:2px}
.sc-body::-webkit-scrollbar-thumb{background:var(--line2)}
@media(max-width:860px){.sc-body{overflow:visible}}

/* ── Table row ── */
.row{
  display:grid;
  grid-template-columns:56px 92px 1fr 148px 72px;
  padding:0 10px 0 13px;gap:6px;
  height:36px;
  align-items:center;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  transition:background .07s;
  position:relative;
}
.row::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:0 2px 2px 0;background:var(--dim);transition:background .15s}
.row.ec-g::before{background:var(--green)}
.row.ec-a::before{background:var(--amber)}
.row.ec-r::before{background:#6b2121}
.row:hover{background:rgba(255,255,255,.025)}
.row.sel{background:rgba(34,197,94,.04)}
.row.is-new::before{background:var(--green);box-shadow:0 0 6px var(--green)}

@media(max-width:860px){
  .row{
    grid-template-columns:52px 1fr 104px;
    height:48px;
    padding:0 8px 0 12px;
  }
}

/* Edge cell */
.r-edge{
  font-family:'SF Mono','Fira Code',monospace;
  font-size:13px;font-weight:900;line-height:1;
  white-space:nowrap;
  letter-spacing:-.3px;
}
.r-edge.g{color:var(--green)}
.r-edge.a{color:var(--amber)}
.r-edge.r{color:var(--red)}

/* Market cell */
.r-mkt{display:flex;flex-direction:column;gap:1px;min-width:0}
.r-mkt-main{font-size:11px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-mkt-sub{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Match cell */
.r-match{
  display:flex;flex-direction:column;gap:1px;min-width:0;
}
.r-match-teams{font-size:11px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-match-sub{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Books cell */
.r-books{display:flex;align-items:center;gap:5px;overflow:hidden;font-family:'SF Mono',monospace}
.r-bk{font-size:12px;font-weight:800;white-space:nowrap;line-height:1}
.r-bk.sharp{color:var(--amber)}
.r-bk.best{color:var(--green)}
.r-bk.soft{color:var(--muted);font-weight:500}
.r-bk-sep{color:var(--dim);font-size:9px}

/* Movement / status cell */
.r-meta{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:0}
.r-move{font-family:'SF Mono',monospace;font-size:9px;font-weight:700;white-space:nowrap}
.r-move.ok{color:var(--green);font-weight:800}
.r-move.late{color:var(--red)}
.r-move.flat{color:var(--dim)}
.r-badge{font-size:7.5px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;padding:1px 3px;border-radius:2px}
.r-badge.sharp{color:#86efac;background:rgba(34,197,94,.1)}
.r-badge.interp{color:var(--amber);background:rgba(245,200,66,.08)}
.r-badge.legacy{color:#9d8ccc;background:rgba(139,92,246,.08)}
.r-badge.new-sig{color:var(--green);animation:nblink 2s infinite}
@keyframes nblink{0%,100%{opacity:1}50%{opacity:.4}}

/* Mobile: merge match into market cell */
@media(max-width:860px){
  .r-match{display:none}
  .r-mkt-mob{display:flex;flex-direction:column;gap:2px}
  .r-bks-mob{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  /* Explicit placement: books top-right, meta bottom-right — prevents meta wrapping to col1 */
  .r-books{grid-column:3;grid-row:1;align-self:start;justify-self:end;padding-top:5px}
  .r-meta{grid-column:3;grid-row:1;align-self:end;justify-self:end;padding-bottom:4px}
}
@media(min-width:861px){
  .r-mkt-mob-teams{display:none}
}

/* ── Detail panel ── */
.detail{
  border-left:1px solid var(--line);background:var(--bg1);
  overflow-y:auto;scrollbar-width:thin;min-width:0;display:flex;flex-direction:column;
}
.detail::-webkit-scrollbar{width:2px}
.detail::-webkit-scrollbar-thumb{background:var(--line2)}
.detail.hidden{display:none}

.det-head{
  padding:8px 10px;border-bottom:1px solid var(--line);flex-shrink:0;
  background:var(--bg2);position:sticky;top:0;z-index:5;
  display:flex;align-items:flex-start;gap:6px;
}
.det-hi{flex:1;min-width:0}
.det-title{font-size:11px;font-weight:700;color:var(--txt);line-height:1.3}
.det-sub{font-size:9px;color:var(--muted);margin-top:2px}
.det-x{padding:2px 7px;border-radius:3px;background:var(--bg2);border:1px solid var(--line2);font-size:10px;color:var(--muted)}
.det-x:hover{color:var(--txt)}
.det-body{padding:8px;flex:1}

/* Detail data sections */
.ds{margin-bottom:10px}
.ds-h{
  font-size:9px;text-transform:uppercase;letter-spacing:.7px;
  color:var(--muted);font-weight:700;margin-bottom:5px;padding-bottom:3px;
  border-bottom:1px solid var(--line);
}

/* Key-value rows in detail */
.dkv{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--line);font-size:10px}
.dkv:last-child{border-bottom:0}
.dk{color:var(--muted)}
.dv{font-family:'SF Mono',monospace;font-weight:700;color:var(--txt)}
.dv.g{color:var(--green)}
.dv.r{color:var(--red)}
.dv.a{color:var(--amber)}
.dv.dim{color:var(--muted)}

/* Model bars */
.mb-wrap{display:flex;flex-direction:column;gap:4px}
.mb-row{display:flex;align-items:center;gap:5px;font-size:9px}
.mb-l{width:88px;color:var(--muted);flex-shrink:0}
.mb-trk{flex:1;height:2px;background:var(--line2);border-radius:1px;overflow:hidden}
.mb-f{height:100%;border-radius:1px}
.mb-f.model{background:var(--green)}
.mb-f.imp-t{background:var(--blue)}
.mb-f.imp-s{background:var(--amber)}
.mb-val{width:34px;text-align:right;font-family:'SF Mono',monospace;font-weight:700;font-size:9px}
.edge-inline{display:flex;gap:10px;margin-top:5px;font-size:9px;flex-wrap:wrap}
.edge-inline .l{color:var(--muted)}

/* Books table in detail */
.bk-tbl{width:100%;border-collapse:collapse;font-size:10px}
.bk-tbl tr{border-bottom:1px solid var(--line)}
.bk-tbl tr:last-child{border-bottom:0}
.bk-tbl td{padding:3px 4px;font-family:'SF Mono',monospace}
.bk-tbl td:first-child{color:var(--muted);font-family:inherit;font-size:9px}
.bk-tbl .bk-sharp-row td:first-child{color:var(--amber)}
.bk-tbl .ep{color:var(--green);font-size:9px}
.bk-tbl .en{color:var(--red);font-size:9px}

/* Line movement */
.lm-ladder{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.lm-rung{text-align:center}
.lm-rl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.lm-rv{font-size:12px;font-weight:800;font-family:'SF Mono',monospace;margin-top:1px}
.lm-rung.det .lm-rv{color:var(--green)}
.lm-arr{color:var(--dim);font-size:11px}
.lm-sum{font-size:9px;padding:4px 7px;border-radius:3px;background:var(--bg2);border:1px solid var(--line2)}
.lm-sum.ahead{border-color:var(--green-b);color:#86efac}
.lm-sum.late{border-color:#301010;color:#fca5a5}
.lm-wrap{margin:5px 0;border:1px solid var(--line2);border-radius:3px;overflow:hidden;background:#04040a}
.lm-svg{display:block;width:100%;height:80px}
.lm-empty{font-size:9px;color:var(--muted);padding:8px;text-align:center}
.lm-legend{display:flex;gap:10px;margin-top:4px;font-size:8px;color:var(--muted)}
.lmd{width:8px;height:2px;border-radius:1px;display:inline-block;margin-right:2px;vertical-align:middle}
.lmd.s{background:var(--amber)}
.lmd.so{background:var(--blue)}
.lmd.d{background:var(--green)}

/* Similar CLV */
.sim-tbl{width:100%;border-collapse:collapse;font-size:9px}
.sim-tbl th{text-align:left;padding:2px 4px;color:var(--muted);font-size:8px;border-bottom:1px solid var(--line)}
.sim-tbl td{padding:2px 4px;border-bottom:1px solid var(--line);font-family:'SF Mono',monospace}
.cp{color:var(--green);font-weight:700}
.cn{color:var(--red);font-weight:700}

/* Signal strength */
.ss-w{display:grid;grid-template-columns:64px 1fr;gap:8px;align-items:center}
.ss-c{width:56px;height:56px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:conic-gradient(var(--ssc,var(--green)) calc(var(--ssp,0)*1%),var(--line2) 0);position:relative}
.ss-c::before{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--bg1)}
.ss-n{position:relative;font-size:17px;font-weight:800;font-family:'SF Mono',monospace;line-height:1}
.ss-t{position:relative;font-size:7px;color:var(--muted)}
.ss-mg{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;font-size:9px}
.ss-mr{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:2px 0}
.ss-mr:last-child,.ss-mr:nth-last-child(2){border-bottom:0}
.ss-ml{color:var(--muted)}
.ss-mv{font-weight:700;font-family:'SF Mono',monospace}
.ss-mv.pos{color:var(--green)}
.ss-mv.neg{color:var(--red)}
.ss-mv.a{color:var(--amber)}
.ss-e{font-size:9px;color:var(--muted);padding:8px;text-align:center}
/* ── Match Market View ── */
.mm-head{padding:8px 10px 7px;border-bottom:1px solid var(--line);background:var(--bg2)}
.mm-title{font-size:11px;font-weight:700;color:var(--txt)}
.mm-sub{font-size:9px;color:var(--muted);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.mm-tag{background:var(--bg2);border:1px solid var(--line2);border-radius:2px;padding:1px 5px;font-size:7.5px;font-weight:900;letter-spacing:.4px;text-transform:uppercase;color:var(--txt)}
.mm-hdr{display:grid;grid-template-columns:1fr 52px 52px 54px 58px;padding:3px 10px 3px 15px;font-size:7.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line);font-weight:700}
.mm-hdr div{text-align:right}.mm-hdr div:first-child{text-align:left}
.mm-row{
  display:grid;grid-template-columns:1fr 52px 52px 54px 58px;
  padding:7px 10px 7px 15px;min-height:52px;height:auto;align-items:start;
  border-bottom:none;cursor:pointer;transition:background .07s;
  position:relative;
}
.mm-row::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:0 2px 2px 0;background:var(--dim)}
.mm-row.ec-g::before{background:var(--green)}
.mm-row.ec-a::before{background:var(--amber)}
.mm-row.ec-r::before{background:#6b2121}
.mm-row:hover{background:rgba(255,255,255,.025)}
.mm-mkt{display:flex;flex-direction:column;gap:1px;min-width:0}
.mm-sel{font-size:10px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mm-type{font-size:8px;color:var(--muted)}
.mm-sharp,.mm-best{font-size:11px;font-weight:800;font-family:'SF Mono',monospace;white-space:nowrap;text-align:right}
.mm-sharp{color:var(--amber)}.mm-best{color:var(--green)}
.mm-no{color:var(--dim);font-size:10px;font-weight:400}
.mm-edge{font-size:12px;font-weight:900;font-family:'SF Mono',monospace;text-align:right;white-space:nowrap}
.mm-edge.g{color:var(--green)}.mm-edge.a{color:var(--amber)}.mm-edge.r{color:var(--red)}
.mm-sig{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.mm-mv{font-size:8px;font-weight:700;font-family:'SF Mono',monospace}
.mm-mv.moved{color:var(--green)}.mm-mv.drift{color:var(--red)}.mm-mv.flat{color:var(--dim)}
.mm-badge{font-size:7px;font-weight:900;letter-spacing:.4px;text-transform:uppercase;padding:1px 3px;border-radius:2px}
.mm-badge.sharp{color:#86efac;background:rgba(34,197,94,.1)}
.mm-badge.legacy{color:#9d8ccc;background:rgba(139,92,246,.08)}
.mm-badge.interp{color:var(--amber);background:rgba(245,200,66,.08)}
/* ── Decision labels ── */
.dec-label{font-size:7px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;padding:2px 5px;border-radius:2px;white-space:nowrap}
.dec-bet{color:#86efac;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.25)}
.dec-watch{color:var(--amber);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.2)}
.dec-pass{color:var(--dim);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
/* ── Urgency states ── */
.urg-label{font-size:6.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:1px 4px;border-radius:2px;display:inline-block}
.urg-early{color:#6b9de8;background:rgba(107,157,232,.1)}
.urg-live{color:var(--green);background:rgba(34,197,94,.1);animation:upulse 2s infinite}
.urg-fading{color:var(--red);background:rgba(239,68,68,.1)}
.urg-gone{color:var(--dim);background:rgba(255,255,255,.05)}
@keyframes upulse{0%,100%{opacity:1}50%{opacity:.45}}
/* ── Best angle badge ── */
.best-angle{font-size:6.5px;font-weight:800;color:#ffd700;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.25);padding:1px 4px;border-radius:2px;letter-spacing:.3px}
/* ── Match summary strip ── */
.mm-summary{display:flex;gap:1px;background:var(--line);border-bottom:2px solid var(--line2);overflow-x:auto;scrollbar-width:none}
.mm-summary::-webkit-scrollbar{display:none}
.mm-sum-stat{background:var(--bg);padding:8px 12px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;min-width:64px}
.mm-sum-val{font-size:14px;font-weight:800;color:var(--txt);line-height:1}
.mm-sum-lbl{font-size:7px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
/* ── Filter bar ── */
.mm-filters{display:flex;gap:5px;padding:7px 10px;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;background:var(--bg2)}
.mm-filters::-webkit-scrollbar{display:none}
.mm-filter-pill{font-size:8px;font-weight:700;padding:3px 9px;border-radius:10px;border:1px solid var(--line2);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.mm-filter-pill.on{color:var(--bg);background:var(--txt);border-color:var(--txt)}
/* ── Why panel ── */
.mm-entry{display:block;border-bottom:1px solid var(--line)}
.why-panel{display:none;background:rgba(255,255,255,.025);border-top:1px solid var(--line);padding:9px 12px;font-size:8.5px;line-height:1.7}
.why-panel.open{display:block}
.why-row{display:flex;justify-content:space-between;gap:8px;padding:1px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.why-row:last-child{border-bottom:none}
.why-key{color:var(--dim)}
.why-val{font-weight:700;color:var(--txt);text-align:right}
.why-val.pos{color:var(--green)}.why-val.neg{color:var(--red)}.why-val.neu{color:var(--amber)}
.why-detail-link{display:block;text-align:right;margin-top:6px;font-size:7.5px;color:var(--muted);cursor:pointer;letter-spacing:.3px}
.why-detail-link:hover{color:var(--txt)}
/* ── Card layout ── */
.mk-card{padding:10px 12px 8px 15px;position:relative;cursor:pointer;transition:background .07s}
.mk-card:hover{background:rgba(255,255,255,.025)}
.mk-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.mk-card.ec-g::before{background:var(--green)}.mk-card.ec-a::before{background:var(--amber)}.mk-card.ec-r::before{background:#6b2121}
.mk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:6px}
.mk-name{font-size:11px;font-weight:700;color:var(--txt);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mk-edge-row{display:flex;align-items:baseline;gap:14px;margin:4px 0 6px 0;flex-wrap:wrap}
.mk-edge-now-w{display:flex;flex-direction:column}
.mk-edge-now{font-size:20px;font-weight:900;line-height:1}
.mk-edge-now.ec-g{color:var(--green)}.mk-edge-now.ec-a{color:var(--amber)}.mk-edge-now.ec-r{color:var(--red)}
.mk-edge-lbl{font-size:7px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.mk-edge-peak-w{display:flex;flex-direction:column;gap:1px;padding-bottom:2px}
.mk-edge-peak{font-size:9px;color:var(--muted)}
.mk-edge-delta{font-size:9px;font-weight:700}
.mk-edge-delta.down{color:var(--red)}.mk-edge-delta.up{color:var(--green)}.mk-edge-delta.flat{color:var(--dim)}
.mk-action{display:inline-block;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:3px;margin-bottom:6px}
.mk-action.bet{color:#86efac;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25)}
.mk-action.late{color:var(--amber);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.2)}
.mk-action.watch{color:#6b9de8;background:rgba(107,157,232,.1);border:1px solid rgba(107,157,232,.2)}
.mk-action.pass{color:var(--dim);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.mk-mini-row{display:flex;gap:8px;font-size:8.5px;color:var(--muted);margin-bottom:5px;flex-wrap:wrap;align-items:center}
.mk-sep{color:var(--line2);margin:0 1px}
.mk-conf-block{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:4px;font-size:7.5px}
.mk-cl{font-weight:900;letter-spacing:.4px;font-size:8px;min-width:44px}
.mk-cl.pos{color:var(--green)}.mk-cl.neu{color:var(--amber)}.mk-cl.neg{color:var(--red)}
.mk-chk{font-size:7.5px}.mk-chk.ok{color:var(--txt);opacity:.9}.mk-chk.no{color:var(--dim);opacity:.5}
.mk-mv-text{font-size:8px;color:var(--dim);font-style:italic;margin-bottom:3px}
.mk-sharp-status{font-size:8px;margin-bottom:4px;margin-top:2px}
.mk-best-angle{font-size:7.5px;font-weight:800;color:#ffd700;background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.2);padding:3px 10px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px;border-radius:2px;display:block}
.mk-expand{font-size:7.5px;color:var(--dim);cursor:pointer;letter-spacing:.3px;margin-top:6px;display:inline-block;padding:2px 0;border-bottom:1px dashed rgba(255,255,255,.1)}
.mk-expand:hover{color:var(--txt)}
.mk-why{display:none;margin-top:8px;padding-top:7px;border-top:1px solid var(--line);font-size:8.5px;line-height:2}
.mk-why.open{display:block}
.mk-why-item{display:flex;align-items:baseline;gap:6px}
.mk-why-dot{font-size:8px;font-weight:800;flex-shrink:0}
.mk-why-dot.ok{color:var(--green)}.mk-why-dot.no{color:var(--red)}
.mk-why-full{font-size:7.5px;color:var(--muted);cursor:pointer;margin-top:5px;letter-spacing:.2px;display:block;text-align:right}
.mk-why-full:hover{color:var(--txt)}
/* Market state classes */
.state-building,.state-live,.state-fading,.state-gone{font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 5px;border-radius:2px;flex-shrink:0}
.state-building{color:#6b9de8;background:rgba(107,157,232,.1)}
.state-live{color:var(--green);background:rgba(34,197,94,.1);animation:upulse 2s infinite}
.state-fading{color:var(--red);background:rgba(239,68,68,.1)}
.state-gone{color:var(--dim);background:rgba(255,255,255,.04)}
/* ── Tier section headers ── */
.mm-tier-h{padding:3px 10px 3px 15px;font-size:7.5px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.01)}
.mm-tier-h.strong{color:var(--green)}.mm-tier-h.medium{color:var(--amber)}.mm-tier-h.developing{color:var(--dim)}
/* Show more toggle */
.mm-more{padding:9px 10px;text-align:center;cursor:pointer;font-size:9px;font-weight:700;color:var(--muted);border-top:1px solid var(--line);letter-spacing:.4px;transition:color .1s,background .1s}
.mm-more:hover{color:var(--txt);background:rgba(255,255,255,.025)}
@media(max-width:860px){
  .mm-hdr{display:none}
  .mm-row{grid-template-columns:1fr 56px 62px;padding:6px 8px 6px 12px;min-height:48px;height:auto;align-items:start}
  .mm-sharp{display:none}.mm-best{display:none}
  .mm-edge{grid-column:2;grid-row:1}
  .mm-sig{grid-column:3;grid-row:1}
}
/* Back button */
.det-back{display:flex;align-items:center;gap:5px;padding:6px 10px;font-size:9px;color:var(--muted);cursor:pointer;border-bottom:1px solid var(--line);background:var(--bg2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;transition:color .1s}
.det-back:hover{color:var(--txt)}.det-back-arr{font-size:13px;line-height:1}


/* Mobile bottom sheet */
.mob-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);align-items:flex-end}
.mob-bg.open{display:flex}
.mob-sheet{background:var(--bg2);border-top:1px solid var(--line2);border-radius:10px 10px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.mob-sh-head{padding:8px 12px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:8px;position:sticky;top:0;background:var(--bg2);z-index:2}
.mob-sh-title{font-size:12px;font-weight:700;flex:1;color:var(--txt)}
.mob-sh-x{padding:3px 8px;border-radius:3px;background:var(--bg1);border:1px solid var(--line2);font-size:10px;color:var(--muted)}
.mob-body{padding:8px}

/* Empty */
.empty-s{padding:32px 16px;text-align:center;color:var(--muted)}
.empty-t{font-size:11px;font-weight:700;color:var(--txt);margin-bottom:3px}
.empty-sub{font-size:9px}
</style>

<script>
/* Error trap — catches ANY JS error and shows it in nav */
window.onerror=function(msg,src,line,col,err){
  var el=document.getElementById('updatedAt');
  if(el)el.textContent='ERR:L'+line+' '+(String(msg||'').slice(0,25));
  return false;
};
/* Synchronous probe — runs before anything else */
(function(){var el=document.getElementById('updatedAt');if(el)el.textContent='JS:v20260419f';})();
const S={picks:[],filters:{sport:'all',market:'all',edge:0,sharp:false}};
const $=id=>document.getElementById(id);
const fP=(v,s=true)=>{if(v==null||isNaN(v))return'—';return(s&&v>0?'+':'')+Number(v).toFixed(1)+'%'};
const fO=v=>(v==null||isNaN(v))?'—':Number(v).toFixed(2);
const ago=m=>{if(m==null)return'—';if(m<1)return'now';if(m<60)return`${m}m`;return`${Math.floor(m/60)}h`};

const SHARP_BOOKS=new Set(['Pinnacle','Betfair','Matchbook','betfair_ex_eu','pinnacle','matchbook']);

function pickStatus(p){return p.confidence_label||(p.sharp_price_at_detection?'SHARP_CONFIRMED':'UNVERIFIED_LEGACY')}
function sportOf(p){const l=(p.league||'').toLowerCase();if(l.includes('nba')||l.includes('basketball'))return'basketball';if(l.includes('nhl')||l.includes('hockey'))return'hockey';return'football';}

/* ── Inline books for row ── */
function rowBooks(p, maxBooks=3){
  let bm={};
  try{bm=typeof p.odds_by_bookmaker==='string'?JSON.parse(p.odds_by_bookmaker):(p.odds_by_bookmaker||{});}catch(e){}
  const entries=Object.entries(bm).filter(([,v])=>v>1);

  // fallback
  if(!entries.length){
    const out=[];
    if(p.sharp_price_at_detection&&p.sharp_book_at_detection)
      out.push({n:p.sharp_book_at_detection,v:p.sharp_price_at_detection,sharp:true,best:false});
    if(p.best_odds_value&&(p.best_price_book||p.best_odds_bookmaker))
      out.push({n:p.best_price_book||p.best_odds_bookmaker,v:p.best_odds_value,sharp:false,best:true});
    return out.map(b=>`<span class="r-bk ${b.sharp?'sharp':b.best?'best':'soft'}">${b.sharp?'⚡':''}${fO(b.v)}</span>`).join('<span class="r-bk-sep">·</span>');
  }

  entries.sort((a,b)=>{const as=SHARP_BOOKS.has(a[0])?1:0,bs=SHARP_BOOKS.has(b[0])?1:0;return bs-as||(b[1]-a[1]);});
  const bestVal=Math.max(...entries.map(e=>e[1]));
  const vis=entries.slice(0,maxBooks);
  const rest=entries.length-maxBooks;
  let h=vis.map(([n,v],i)=>{
    const isSharp=SHARP_BOOKS.has(n);
    const isBest=!isSharp&&Math.abs(v-bestVal)<0.001;
    const cls=isSharp?'sharp':(isBest?'best':'soft');
    return `<span class="r-bk ${cls}">${isSharp?'⚡':''}${fO(v)}</span>`;
  }).join('<span class="r-bk-sep">·</span>');
  if(rest>0)h+=`<span class="r-bk soft"> +${rest}</span>`;
  return h;
}

/* ── Movement label ── */
function mvLabel(p){
  if(p.movement_pct==null)return{cls:'',txt:''};
  const m=p.movement_pct;
  if(m<=-1.5)return{cls:'ok',txt:`MOVED ${m.toFixed(1)}%`};
  if(m>=1.5)return{cls:'late',txt:`DRIFT +${m.toFixed(1)}%`};
  return{cls:'flat',txt:`FLAT ${m>0?'+':''}${m.toFixed(1)}%`};
}

/* ── Status badge text ── */
function statusLbl(st){
  if(st==='SHARP_CONFIRMED')return{cls:'sharp',txt:'SHARP'};
  if(st==='INTERPOLATED')return{cls:'interp',txt:'INTERP'};
  if(st==='UNVERIFIED_LEGACY')return{cls:'legacy',txt:'LEGACY'};
  return{cls:'',txt:''};
}

/* ── Filters ── */
document.querySelectorAll('.chip[data-filter]').forEach(c=>{
  c.addEventListener('click',()=>{
    const f=c.dataset.filter,v=c.dataset.value;
    if(f==='sharp'){S.filters.sharp=!S.filters.sharp;c.classList.toggle('active',S.filters.sharp);}
    else{document.querySelectorAll(`.chip[data-filter="${f}"]`).forEach(x=>x.classList.remove('active'));c.classList.add('active');S.filters[f]=f==='edge'?+v:v;}
    render();
  });
});
function applyFilters(picks){
  return picks.filter(p=>{
    if(S.filters.sport!=='all'&&sportOf(p)!==S.filters.sport)return false;
    if(S.filters.market!=='all'){const mk=(p.market||'').toUpperCase()+' '+(p.selection||'').toUpperCase();if(!mk.includes(S.filters.market))return false;}
    if(S.filters.edge>0&&(p.edge_pct||0)<S.filters.edge)return false;
    if(S.filters.sharp&&pickStatus(p)!=='SHARP_CONFIRMED')return false;
    return true;
  });
}

/* ── KPI strip ── */
function renderKPIs(picks){
  $('liveCount').textContent=picks.length;
  $('scanCount').textContent=picks.length+' signals';
  const sp=picks.filter(p=>pickStatus(p)==='SHARP_CONFIRMED');
  $('kpiSharp').textContent=sp.length;
  const avg=sp.length?sp.reduce((a,p)=>a+(p.edge_pct||0),0)/sp.length:null;
  const ka=$('kpiAvgEdge');ka.textContent=avg!=null?fP(avg):'—';ka.className='ki-v '+(avg==null?'':(avg>0?'g':'r'));
  const top=picks.slice().sort((a,b)=>(b.edge_pct||0)-(a.edge_pct||0))[0];
  $('kpiTop').textContent=top&&top.edge_pct?fP(top.edge_pct):'—';
  $('kpiTopM').textContent=top?`${top.home_team||''}`.slice(0,14):'';
}

/* ── Render scanner rows ── */
function renderScanner(picks){
  // ── Deduplicate: one row per match (highest edge is representative) ──
  const _matchMap=new Map();
  picks.forEach(p=>{
    const key=(p.home_team||'')+'|'+(p.away_team||'')+'|'+(p.kickoff_epoch||p.match_date||'');
    if(!_matchMap.has(key))_matchMap.set(key,[]);
    _matchMap.get(key).push(p);
  });
  const matchRows=Array.from(_matchMap.values()).map(grp=>{
    grp.sort((a,b)=>(b.edge_pct||0)-(a.edge_pct||0));
    return Object.assign({},grp[0],{_mkt_count:grp.length});
  });
  matchRows.sort((a,b)=>(b.edge_pct||0)-(a.edge_pct||0));

  $('scanMeta').textContent=`${matchRows.length} matches · 60s`;
  if(!matchRows.length){
    $('scBody').innerHTML=`<div class="empty-s"><div class="empty-t">No signals</div><div class="empty-sub">Lower min edge or clear sharp-only filter</div></div>`;
    return;
  }
  $('scBody').innerHTML=matchRows.map(p=>{
    try{
      const st=pickStatus(p);
      const isNew=p.age_minutes!=null&&p.age_minutes<12;
      const ec=(p.edge_pct||0)>=8?'g':((p.edge_pct||0)>=3?'a':'r');
      const mv=mvLabel(p);

/* ── Decision engine v2 ── */
var _mmFilters={betOnly:false,sharpOnly:false,hideLegacy:false,hideSoft:false,showFading:false};
var _mmState={data:null,tgt:null};

function calcEdges(mk){
  var det=parseFloat(mk.edge_pct)||0;
  var nowE=(mk.model_prob&&mk.best_available)?Math.round((mk.model_prob*mk.best_available-1)*1000)/10:det;
  var peak=Math.max(det,nowE);
  return{detected:parseFloat(det.toFixed(1)),now:parseFloat(nowE.toFixed(1)),peak:parseFloat(peak.toFixed(1)),delta:parseFloat((nowE-peak).toFixed(1))};
}
function getDecision4(mk,e){
  var drift=mk.movement_type==='drift';
  var pctFP=e.peak>0?((e.now-e.peak)/e.peak)*100:0;
  if(e.now<2)return{state:'pass',reason:'line gone'};
  if(mk.tier==='developing'&&!mk.sharp_ref&&(mk.book_count||0)<2)return{state:'pass',reason:'insufficient data'};
  if(pctFP<-25||(drift&&e.delta<-4))return{state:'late',reason:'value reduced'};
  if(mk.tier==='strong'&&!drift&&pctFP>=-25)return{state:'bet',reason:'edge still live'};
  if(mk.tier==='medium'&&!drift&&pctFP>=-20)return{state:'watch',reason:'needs confirmation'};
  if(drift)return{state:'watch',reason:'needs confirmation'};
  return{state:'watch',reason:'needs confirmation'};
}
function getMarketState(mk,e,ko){
  var drift=mk.movement_type==='drift',moved=mk.movement_type==='moved';
  var diff=ko?(ko-Date.now()/1000):null;
  if(e.now<2||e.delta<-12)return{state:'GONE',desc:'market corrected too far',cls:'gone'};
  if(drift&&e.delta<-3)return{state:'FADING',desc:'sharp money already hit this line',cls:'fading'};
  if(moved)return{state:'BUILDING',desc:'market moving toward signal',cls:'building'};
  if(diff!==null&&diff<3600)return{state:'LIVE NOW',desc:'edge active and still strong',cls:'live'};
  if(mk.tier==='strong'&&e.now>=8)return{state:'LIVE NOW',desc:'edge active and still strong',cls:'live'};
  return{state:'BUILDING',desc:'market moving toward signal',cls:'building'};
}
function mmFilterMarkets(markets){
  return markets.filter(function(mk){
    if(_mmFilters.betOnly&&getDecision4(mk,calcEdges(mk)).state!=='bet')return false;
    if(_mmFilters.sharpOnly&&!mk.sharp_ref)return false;
    if(_mmFilters.hideLegacy&&mk.signal_cls==='legacy')return false;
    if(_mmFilters.hideSoft&&!mk.sharp_ref&&(mk.book_count||0)<2)return false;
    if(!_mmFilters.showFading&&mk.movement_type==='drift'&&mk.tier!=='strong')return false;
    return true;
  });
}
function mmFilterToggle(uid,key){
  _mmFilters[key]=!_mmFilters[key];
  var btn=document.getElementById('mmf-'+uid+'-'+key);
  if(btn)btn.classList.toggle('on',_mmFilters[key]);
  if(_mmState.data&&_mmState.tgt){var c=_mmState.tgt==='desk'?$('detBody'):$('mobBody');c.innerHTML=buildMatchMarkets(_mmState.data,_mmState.tgt);}
}
function mmExpand(id){
  var el=document.getElementById('why-'+id),lbl=document.getElementById('mk-exp-lbl-'+id);
  if(!el)return;
  var open=el.classList.toggle('open');
  if(lbl)lbl.textContent=open?'why \u25b4':'why \u25be';
}
function buildMatchSummary(m,markets){
  var vis=markets.filter(function(mk){return mk.tier!=='noise';});
  var sct=vis.filter(function(mk){return mk.tier==='strong';}).length;
  var mct=vis.filter(function(mk){return mk.tier==='medium';}).length;
  var bestE=vis.length?Math.max.apply(null,vis.map(function(mk){return mk.edge_pct||0;})):0;
  var avgE=vis.length?vis.reduce(function(s,mk){return s+(mk.edge_pct||0);},0)/vis.length:0;
  var hasSharp=vis.some(function(mk){return!!mk.sharp_ref;});
  var hasMoved=vis.some(function(mk){return mk.movement_type==='moved';});
  var hasDrift=vis.some(function(mk){return mk.movement_type==='drift';});
  var sharpTxt=hasSharp?'SHARP \u2713':'NO SHARP ANCHOR';
  var sharpSub=hasSharp?'sharp book anchor confirmed':'lower confidence signal';
  var sharpCol=hasSharp?'var(--green)':'var(--red)';
  var stateTxt=hasDrift?'FADING':(hasMoved?'BUILDING':'STABLE');
  var stateCol=hasDrift?'var(--red)':(hasMoved?'var(--green)':'var(--muted)');
  var bestCol=bestE>=10?'var(--green)':(bestE>=5?'var(--amber)':'var(--txt)');
  return'<div class="mm-summary">'
    +'<div class="mm-sum-stat"><div class="mm-sum-val" style="color:'+bestCol+'">'+fP(bestE)+'</div><div class="mm-sum-lbl">Best Edge</div></div>'
    +'<div class="mm-sum-stat"><div class="mm-sum-val">'+sct+'S\u00b7'+mct+'M</div><div class="mm-sum-lbl">Signals</div></div>'
    +'<div class="mm-sum-stat"><div class="mm-sum-val" style="color:'+stateCol+';font-size:10px;margin-top:3px">'+stateTxt+'</div><div class="mm-sum-lbl">Market State</div></div>'
    +'<div class="mm-sum-stat"><div class="mm-sum-val" style="color:'+sharpCol+';font-size:9px;line-height:1.3">'+sharpTxt+'<br><span style="color:var(--dim);font-size:6.5px;font-weight:400">'+sharpSub+'</span></div><div class="mm-sum-lbl">Sharp Status</div></div>'
    +'<div class="mm-sum-stat"><div class="mm-sum-val" style="color:var(--amber)">'+fP(avgE)+'</div><div class="mm-sum-lbl">Avg Edge</div></div>'
    +'</div>';
}
function buildFilterBar(uid){
  var pills=[{key:'betOnly',lbl:'BET NOW'},{key:'sharpOnly',lbl:'Sharp only'},{key:'hideLegacy',lbl:'Hide legacy'},{key:'hideSoft',lbl:'Hide soft'},{key:'showFading',lbl:'Show fading'}];
  return'<div class="mm-filters">'+pills.map(function(f){
    return'<div class="mm-filter-pill'+(_mmFilters[f.key]?' on':'')+'" id="mmf-'+uid+'-'+f.key+'" onclick="mmFilterToggle(\''+uid+'\',\''+f.key+'\')">'+f.lbl+'</div>';
  }).join('')+'</div>';
}
function buildMkCard(mk,tgt,isBest,ko){
  var e=calcEdges(mk);
  var dec=getDecision4(mk,e);
  var mst=getMarketState(mk,e,ko);
  var ec=mk.tier==='strong'?'g':(mk.tier==='medium'?'a':'r');
  var hasSharp=!!mk.sharp_ref,hasMoved=mk.movement_type==='moved',hasDrift=mk.movement_type==='drift';
  var booksOk=(mk.book_count||0)>=2,pricingOk=!!(mk.best_available&&mk.model_prob);
  // Edge delta display
  var showPeak=Math.abs(e.delta)>0.3||e.detected!==e.now;
  var edgeDeltaCls=e.delta<-2?'down':(e.delta>0.5?'up':'flat');
  var edgeDeltaTxt=Math.abs(e.delta)>0.2?(e.delta>0?'+':'')+e.delta+'% from peak':'at peak';
  // Confidence
  var cc=[{lbl:'pricing',ok:pricingOk},{lbl:'movement',ok:hasMoved},{lbl:'books',ok:booksOk},{lbl:'sharp',ok:hasSharp}];
  var cs=cc.filter(function(c){return c.ok;}).length;
  var clv=cs>=3?'HIGH':(cs>=2?'MEDIUM':'LOW');
  var ccls=cs>=3?'pos':(cs>=2?'neu':'neg');
  // Movement text
  var mvAbs=Math.abs(mk.movement_pct||0).toFixed(1);
  var mvDir=hasMoved?('market moved in your favor, '+mvAbs+'%'):(hasDrift?('market drifted away, +'+mvAbs+'%'):'flat since detection');
  // Sharp status
  var sharpSt=hasSharp
    ?'<span style="color:var(--green)">\u26a1 '+(mk.sharp_book||'Sharp')+' anchor confirmed</span>'
    :'<span style="color:var(--dim)">NO SHARP ANCHOR \u00b7 lower confidence signal</span>';
  // Mini odds row
  var mp=[];
  if(mk.sharp_ref)mp.push('\u26a1'+fO(mk.sharp_ref));
  if(mk.best_available)mp.push('best '+fO(mk.best_available));
  if(mk.model_prob)mp.push('fair '+(1/mk.model_prob).toFixed(2));
  // Action map
  var amap={bet:'mk-action bet',late:'mk-action late',watch:'mk-action watch',pass:'mk-action pass'};
  var albl={bet:'BET NOW',late:'LATE',watch:'WATCH',pass:'PASS'};
  // Why panel
  var showWhy=mk.tier==='strong'||mk.tier==='medium';
  var whyHtml='';
  if(showWhy){
    var wi=[
      {ok:hasSharp,txt:hasSharp?('sharp confirmed \u2014 '+(mk.sharp_book||'Sharp')+' '+fO(mk.sharp_ref)):'sharp not confirmed'},
      {ok:hasMoved,txt:hasMoved?('market moved '+(mk.movement_pct||0).toFixed(1)+'% after detect'):(hasDrift?('market drifted +'+(mk.movement_pct||0).toFixed(1)+'% away'):'flat since detection')},
      {ok:booksOk,txt:booksOk?(( mk.book_count||1)+' books aligned'):'single source \u2014 low confirmation'},
      {ok:Math.abs(e.delta)<5,txt:'edge: '+fP(e.now)+(showPeak?' vs '+fP(e.peak)+' peak':' \u2014 at peak')},
    ];
    whyHtml='<div class="mk-why" id="why-'+mk.id+'">'
      +wi.map(function(item){return'<div class="mk-why-item"><span class="mk-why-dot '+(item.ok?'ok':'no')+'">'+(item.ok?'\u2713':'\u2717')+'</span><span>'+item.txt+'</span></div>';}).join('')
      +'<div class="mk-why-full" onclick="event.stopPropagation();openMarketDetail('+mk.id+',\''+tgt+'\')">full detail \u2192</div>'
      +'</div>';
  }
  var expandBtn=showWhy?'<div class="mk-expand" onclick="event.stopPropagation();mmExpand('+mk.id+')"><span id="mk-exp-lbl-'+mk.id+'">why \u25be</span></div>':'';
  return'<div class="mm-entry">'
    +'<div class="mk-card ec-'+ec+'" onclick="mmExpand('+mk.id+')">'
    +(isBest?'<div class="mk-best-angle">BEST OPPORTUNITY IN MATCH</div>':'')
    +'<div class="mk-top"><div class="mk-name">'+((mk.selection||mk.market||'').toUpperCase())+'</div>'
    +'<div class="state-'+mst.cls+'">'+mst.state+'</div></div>'
    +'<div class="mk-edge-row">'
    +'<div class="mk-edge-now-w"><div class="mk-edge-now ec-'+ec+'">'+(e.now>=0?'+':'')+e.now+'%</div><div class="mk-edge-lbl">now</div></div>'
    +(showPeak?'<div class="mk-edge-peak-w"><div class="mk-edge-peak">'+fP(e.peak)+' peak</div><div class="mk-edge-delta '+edgeDeltaCls+'">'+edgeDeltaTxt+'</div></div>':'')
    +'</div>'
    +'<div class="'+amap[dec.state]+'">'+albl[dec.state]+' \u2014 '+dec.reason+'</div>'
    +(mp.length?'<div class="mk-mini-row">'+mp.join('<span class="mk-sep"> \u00b7 </span>')+'</div>':'')
    +'<div class="mk-conf-block"><span class="mk-cl '+ccls+'">'+clv+'</span>'
    +cc.map(function(c){return'<span class="mk-chk '+(c.ok?'ok':'no')+'">'+c.lbl+' '+(c.ok?'\u2714':'\u2716')+'</span>';}).join('')
    +'</div>'
    +'<div class="mk-mv-text">'+mvDir+'</div>'
    +'<div class="mk-sharp-status">'+sharpSt+'</div>'
    +expandBtn+whyHtml
    +'</div></div>';
}

function buildMatchMarkets(data,tgt){
  var m=data.match,ko=m.kickoff_epoch||null;
  var koStr=ko?new Date(ko*1000).toISOString().slice(11,16):'';
  var uid='mmx'+m.home_team.replace(/\W/g,'')+m.away_team.replace(/\W/g,'');
  var raw=(data.markets||[]).filter(function(mk){return mk.tier!=='noise';});
  var all=mmFilterMarkets(raw);
  var bestId=raw.length?raw.reduce(function(b,mk){return(mk.signal_score||0)>(b.signal_score||0)?mk:b;},raw[0]).id:null;
  var s0=raw.filter(function(mk){return mk.tier==='strong';}).length;
  var m0=raw.filter(function(mk){return mk.tier==='medium';}).length;
  var d0=raw.filter(function(mk){return mk.tier==='developing';}).length;
  var parts=[];
  if(s0)parts.push(s0+' STRONG');if(m0)parts.push(m0+' MED');if(d0)parts.push(d0+' DEV');
  var hdr='<div class="mm-head"><div class="mm-title">'+m.home_team+' vs '+m.away_team+'</div>'
    +'<div class="mm-sub">'+(m.league?'<span>'+m.league+'</span>':'')
    +(koStr?'<span>'+koStr+' UTC</span>':(m.match_date?'<span>'+m.match_date+'</span>':''))
    +'<span class="mm-tag">'+(parts.join(' \u00b7 ')||raw.length+' MARKETS')+'</span></div></div>';
  var summary=buildMatchSummary(m,raw);
  var filterBar=buildFilterBar(uid);
  if(!all.length){
    return hdr+summary+filterBar+'<div class="empty-s"><div class="empty-t">'+(raw.length?'All filtered \u2014 adjust filters':'No qualifying markets')+'</div></div>';
  }
  var strong=all.filter(function(mk){return mk.tier==='strong';});
  var medium=all.filter(function(mk){return mk.tier==='medium';});
  var developing=all.filter(function(mk){return mk.tier==='developing';});
  var maxDef=Math.max(8,strong.length),medSlot=Math.max(0,maxDef-strong.length);
  var medShow=medium.slice(0,medSlot),medHide=medium.slice(medSlot);
  var visHtml=_mmSection('\u25cf Strong signal','strong',strong,tgt,ko,bestId)
             +_mmSection('\u25d1 Medium signal','medium',medShow,tgt,ko,bestId);
  var hidItems=medHide.concat(developing),moreBtn='',hiddenDiv='';
  if(hidItems.length){
    var ml='+ '+hidItems.length+' more market'+(hidItems.length>1?'s':'');
    moreBtn='<div class="mm-more" onclick="mmToggle(\''+uid+'\')"><span id="mm-btn-lbl-'+uid+'">'+ml+'</span></div>';
    hiddenDiv='<div id="mm-hidden-'+uid+'" style="display:none">'
      +_mmSection('\u25d1 Medium signal','medium',medHide,tgt,ko,bestId)
      +_mmSection('\u25cb Developing','developing',developing,tgt,ko,bestId)+'</div>';
    setTimeout(function(){var l=document.getElementById('mm-btn-lbl-'+uid);if(l)l._orig=ml;},50);
  }
  return hdr+summary+filterBar+visHtml+moreBtn+hiddenDiv;
}

    modelHtml=`<div class="ds"><div class="ds-h">Model vs market</div>
      <div class="mb-wrap">
        <div class="mb-row"><span class="mb-l">Model prob</span><div class="mb-trk"><div class="mb-f model" style="width:${w(m.model_prob)}"></div></div><span class="mb-val">${(m.model_prob*100).toFixed(1)}%</span></div>
        <div class="mb-row"><span class="mb-l">Impl @ taken</span><div class="mb-trk"><div class="mb-f imp-t" style="width:${w(m.implied_prob_taken)}"></div></div><span class="mb-val">${(m.implied_prob_taken*100).toFixed(1)}%</span></div>
        ${m.implied_prob_sharp!=null?('<div class="mb-row"><span class="mb-l">Impl @ sharp</span><div class="mb-trk"><div class="mb-f imp-s" style="width:'+w(m.implied_prob_sharp)+'"></div></div><span class="mb-val">'+(m.implied_prob_sharp*100).toFixed(1)+'%</span></div>'):''}
      </div>
      <div class="edge-inline" style="margin-top:5px">
        <span><span class="l">vs taken:</span> <strong style="color:${m.edge_vs_taken_pct>0?'var(--green)':'var(--red)'}">${fP(m.edge_vs_taken_pct)}</strong></span>
        ${m.edge_vs_sharp_pct!=null?('<span><span class="l">vs sharp:</span> <strong style="color:'+(m.edge_vs_sharp_pct>0?'var(--green)':'var(--red)')+'">'+fP(m.edge_vs_sharp_pct)+'</strong></span>'):'<span style="color:var(--dim)">vs sharp: awaiting</span>'}
      </div></div>`;
  }

  /* Signal strength */
  const ssHtml=`<div class="ds"><div class="ds-h">Signal strength</div><div id="ssMount"><div class="ss-e">Computing…</div></div></div>`;

  /* Movement */
  const hasLadder=!lm.has_data&&p.open_odds&&p.close_odds;
  let ladderHtml='';
  if(hasLadder){const mv=(p.close_odds/p.open_odds-1)*100;const cls=mv<=-1.5?'ahead':(mv>=1.5?'late':'');
    const txt=mv<=-1.5?`MOVED ${mv.toFixed(1)}% — ahead of market.`:(mv>=1.5?`DRIFT +${mv.toFixed(1)}% — market disagreed.`:`FLAT (${mv>0?'+':''}${mv.toFixed(1)}%) — consensus.`);
    const dT=p.created_ts?new Date(p.created_ts*1000).toISOString().slice(11,16):'—';
    ladderHtml=`<div class="lm-ladder">
      <div class="lm-rung det"><div class="lm-rl">Detected</div><div class="lm-rv">${fO(p.open_odds)}</div><div style="font-size:7px;color:var(--muted)">${dT} UTC</div></div>
      <span class="lm-arr">→</span>
      <div class="lm-rung"><div class="lm-rl">Best now</div><div class="lm-rv">${fO(p.best_odds_value||p.odds)}</div></div>
      <span class="lm-arr">→</span>
      <div class="lm-rung"><div class="lm-rl">Close</div><div class="lm-rv">${fO(p.close_odds)}</div></div>
    </div><div class="lm-sum ${cls}">${txt}</div>`;
  }
  const lmHtml=`<div class="ds"><div class="ds-h">Movement after detection</div>
    ${lm.has_data?renderLM(lm):(hasLadder?ladderHtml:`<div class="lm-empty">No snapshots yet.</div>`)}
    ${lm.has_data?`<div class="lm-legend"><span><span class="lmd s"></span>Sharp</span><span><span class="lmd so"></span>Soft</span><span><span class="lmd d"></span>Detect</span></div>`:''}
  </div>`;

  /* Books table */
  function _bkRow(b){
    var sc2=b.is_sharp?'bk-sharp-row':'';
    var ic=b.is_sharp?'⚡':'';
    var ec=b.edge_pct!=null?('<span class="'+(b.edge_pct>0?'ep':'en')+'">'+fP(b.edge_pct)+' </span>'):'';
    return '<tr class="'+sc2+'"><td>'+ic+b.book+'</td><td style="text-align:right">'+ec+'</td><td style="text-align:right;color:var(--txt)">'+fO(b.odds)+'</td></tr>';
  }
  const booksHtml=d.books&&d.books.length?('<div class="ds"><div class="ds-h">Books · '+d.books.length+'</div><table class="bk-tbl"><tbody>'+d.books.map(_bkRow).join('')+'</tbody></table></div>'):'';

  /* CLV history */
  function _simRow(r){
    return '<tr><td>'+r.home_team+' vs '+r.away_team+'</td><td style="color:var(--muted)">'+r.selection+'</td><td>'+fO(r.open_odds)+'</td><td>'+fO(r.close_odds)+'</td><td class="'+(r.clv_pct>0?'cp':'cn')+'">'+fP(r.clv_pct)+'</td></tr>';
  }
  var _simBeat=sc.rate_reliable?('<span><span class="l">Beat: </span><strong>'+sc.beat_rate+'%</strong></span>'):'<span style="color:var(--dim)">rate withheld (n&lt;30)</span>';
  var _simInner=sc.rows.length
    ?('<div class="edge-inline" style="margin-bottom:5px"><span><span class="l">n: </span><strong>'+sc.sample_n+'</strong></span><span><span class="l">Avg CLV: </span><strong style="color:'+(sc.avg_clv>0?'var(--green)':'var(--red)')+'">'+fP(sc.avg_clv)+'</strong></span>'+_simBeat+'</div><table class="sim-tbl"><thead><tr><th>Match</th><th>Sel</th><th>Open</th><th>Close</th><th>CLV</th></tr></thead><tbody>'+sc.rows.map(_simRow).join('')+'</tbody></table>')
    :('<div class="lm-empty">No CLV captures for '+(p.league||'')+' · '+p.market+'</div>');
  const simHtml='<div class="ds"><div class="ds-h">CLV history · '+(p.league||'')+' · 30d</div>'+_simInner+'</div>';

  return priceHtml+modelHtml+ssHtml+lmHtml+booksHtml+simHtml;
}

/* ── Signal Strength ── */
async function loadSS(id,mountId){
  const mount=document.getElementById(mountId);if(!mount)return;
  let s=null;try{const r=await authFetch(`/api/v2/pick/${id}/signal_strength`);s=await r.json();}catch(e){mount.innerHTML=`<div class="ss-e">Error</div>`;return;}
  if(!s||!s.has_data){mount.innerHTML=`<div class="ss-e">No snapshots yet.</div>`;return;}
  const sc=s.score??0,tier=sc>=80?'ELITE':sc>=60?'STRONG':sc>=40?'MODEST':'WEAK';
  const col=sc>=80?'var(--green)':sc>=60?'#fcb900':sc>=40?'var(--amber)':'var(--red)';
  const mc=(s.move_size_pct??0)<0?'pos':((s.move_size_pct??0)>0?'neg':'');
  const ttm=s.time_to_move_min==null?'—':`${s.time_to_move_min}m`;
  const ttmC=s.time_to_move_min!=null&&s.time_to_move_min<=5?'pos':(s.time_to_move_min!=null&&s.time_to_move_min<=30?'a':'');
  mount.innerHTML=`<div class="ss-w">
    <div class="ss-c" style="--ssp:${sc};--ssc:${col}"><div class="ss-n">${sc}</div><div class="ss-t">${tier}</div></div>
    <div class="ss-mg">
      <div class="ss-mr"><span class="ss-ml">Instant move</span><span class="ss-mv ${s.instant_move?'pos':''}">${s.instant_move?'YES':'NO'}</span></div>
      <div class="ss-mr"><span class="ss-ml">Move size</span><span class="ss-mv ${mc}">${s.move_size_pct>0?'+':''}${s.move_size_pct}%</span></div>
      <div class="ss-mr"><span class="ss-ml">Books aligned</span><span class="ss-mv">${s.books_aligned}/${s.books_total}</span></div>
      <div class="ss-mr"><span class="ss-ml">Time to move</span><span class="ss-mv ${ttmC}">${ttm}</span></div>
    </div>
  </div>`;
}

/* ── Line movement SVG ── */
function renderLM(lm){
  const W=520,H=80,PL=26,PR=6,PT=6,PB=16;
  const all=[...lm.sharp,...lm.soft];if(!all.length)return'<div class="lm-empty">No data</div>';
  const ts=all.map(p=>p.t),od=all.map(p=>p.odds);
  let tMn=Math.min(...ts),tMx=Math.max(...ts),oMn=Math.min(...od),oMx=Math.max(...od);
  if(lm.detected_at){tMn=Math.min(tMn,lm.detected_at);tMx=Math.max(tMx,lm.detected_at);}
  if(lm.detected_odds){oMn=Math.min(oMn,lm.detected_odds);oMx=Math.max(oMx,lm.detected_odds);}
  if(tMx===tMn)tMx=tMn+60;
  const op=Math.max(.05,(oMx-oMn)*.15);oMn-=op;oMx+=op;
  const xF=t=>PL+(t-tMn)/(tMx-tMn)*(W-PL-PR);
  const yF=o=>PT+(1-(o-oMn)/(oMx-oMn))*(H-PT-PB);
  const pl=(pts,col,sw=1.4)=>{if(!pts.length)return'';const s=pts.slice().sort((a,b)=>a.t-b.t);const d=s.map((p,i)=>(i?'L':'M')+xF(p.t).toFixed(1)+','+yF(p.odds).toFixed(1)).join(' ');return`<path d="${d}" stroke="${col}" stroke-width="${sw}" fill="none" stroke-linejoin="round"/>`;};
  const tks=[oMn,(oMn+oMx)/2,oMx];
  const tkL=tks.map(o=>{const y=yF(o).toFixed(1);return`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#111122" stroke-width="1" stroke-dasharray="2,3"/><text x="${PL-3}" y="${(+y+3)}" fill="#22283a" font-size="6" text-anchor="end">${o.toFixed(2)}</text>`;}).join('');
  let det='';
  if(lm.detected_at&&lm.detected_odds){const dx=xF(lm.detected_at).toFixed(1),dy=yF(lm.detected_odds).toFixed(1);
    det=`<line x1="${dx}" y1="${PT}" x2="${dx}" y2="${H-PB}" stroke="#22c55e" stroke-width="1" stroke-dasharray="2,3" opacity=".5"/>
         <circle cx="${dx}" cy="${dy}" r="2.5" fill="#22c55e" stroke="#04040a" stroke-width="1.5"/>`;
  }
  return `<div class="lm-wrap"><svg class="lm-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${tkL}${pl(lm.soft,'#60a5fa',1.2)}${pl(lm.sharp,'#f5c842',1.8)}${det}</svg></div>`;
}

/* ── CLV sidebar proof ── */
function renderProof(d){
  if(!d)return;const s=d.summary||{};
  $('sN').textContent=s.sample_n||0;
  $('sSplit').textContent=(s.positive_n||0)+'/'+(s.negative_n||0);
  if(s.avg_clv!=null){$('sAvg').textContent=fP(s.avg_clv);$('sAvg').style.color=s.avg_clv>0?'var(--green)':(s.avg_clv<0?'var(--red)':'');}
  else $('sAvg').textContent='awaiting';
  if(s.rate_reliable&&s.beat_rate!=null){$('sBeat').textContent=s.beat_rate+'%';$('sBeat').style.color=s.beat_rate>=55?'var(--green)':(s.beat_rate>=40?'var(--amber)':'var(--red)');}
  else $('sBeat').textContent=s.sample_n>0?`n=${s.sample_n}`:'—';
  const kC=$('kpiCLV');
  if(s.avg_clv!=null){kC.textContent=fP(s.avg_clv);kC.className='ki-v '+(s.avg_clv>0?'g':'r');}
  const kB=$('kpiBeat');
  if(s.rate_reliable&&s.beat_rate!=null){kB.textContent=s.beat_rate+'%';kB.style.color=s.beat_rate>=55?'var(--green)':(s.beat_rate>=40?'var(--amber)':'var(--red)');}
  if(d.distribution&&d.distribution.length){
    const mx=Math.max(...d.distribution.map(b=>b.count),1);
    $('sHist').innerHTML=d.distribution.map((b,i)=>{
      const h=Math.max(2,b.count/mx*32);
      return `<div class="hb" title="${b.label}: ${b.count}"><div class="hb-f ${i<3?'n':''}" style="height:${h}px"></div><div class="hb-l">${b.label}</div></div>`;
    }).join('');
  }
}

/* ── Load & render ── */
let _rendered=false;

function safeRender(){
  try{render();}catch(e){
    var eEl=document.getElementById('updatedAt');
    if(eEl)eEl.textContent='RErr:'+(e.message||'?').slice(0,20);
    console.error('render error',e);
  }
  _rendered=true;
  var tsEl=document.getElementById('updatedAt');
  if(tsEl&&!tsEl.textContent.startsWith('RErr:'))tsEl.textContent=new Date().toLocaleTimeString().slice(0,5);
}

/* ── Auth-aware fetch — redirects to /login on 401/403 ── */
async function authFetch(url, opts){
  let r;
  try{ r=await fetch(url,opts||{}); }
  catch(e){ throw e; }
  if(r.status===401||r.status===403){
    window.location.href='/login';
    throw new Error('auth_required');
  }
  return r;
}


async function loadAll(){
  S.picks=[];
  try{
    const race=Promise.race([
      authFetch('/api/picks/today'),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),7000))
    ]);
    const r=await race;
    const d=await r.json();
    S.picks=(d.picks||d||[]).filter(Boolean);
  }catch(e){S.picks=[];}
  safeRender();
  /* CLV in background — non-blocking */
  authFetch('/api/v2/clv/proof?days=30&sharp_only=true')
    .then(r=>r.json()).then(d=>{if(d)renderProof(d);}).catch(()=>{});
}

/* Safety net: always render within 5s */
setTimeout(()=>{if(!_rendered)safeRender();},5000);

/* Debug: prove JS is alive after 1s — shows version + status */
setTimeout(()=>{
  const sb=$('scBody');
  if(sb && sb.innerHTML.includes('Loading signals')){
    sb.innerHTML='<div class="empty-s"><div class="empty-t" style="color:#4ade80">JS OK · fetching data…</div><div class="empty-sub">v20260419f · if stuck, check URL = /live</div></div>';
  }
},1000);

loadAll();
setInterval(loadAll,60000);
setInterval(()=>{
  if(!S.picks.length)return;
  S.picks.forEach(p=>{if(p.created_ts)p.age_minutes=Math.max(0,Math.floor((Date.now()/1000-p.created_ts)/60));});
  try{render();}catch(e){};
},30000);
</script>
